<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>老全麵線小助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0eb;display:flex;align-items:center;justify-content:center;min-height:100vh}
.loading{text-align:center;color:#999}
.loading .icon{font-size:48px;margin-bottom:16px;animation:bounce 1s infinite}
.loading .text{font-size:15px}
.loading .sub{font-size:12px;color:#ccc;margin-top:8px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.error{text-align:center;padding:40px 20px;color:#666}
.error .icon{font-size:48px;margin-bottom:12px}
.error h2{font-size:18px;margin-bottom:8px;color:#333}
.error p{font-size:14px;line-height:1.6}
.error .btn{display:inline-block;margin-top:16px;padding:10px 24px;background:#D85A30;color:#fff;border-radius:10px;text-decoration:none;font-size:14px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div class="loading">
    <div class="icon">🍜</div>
    <div class="text">載入中...</div>
    <div class="sub">正在連線 LINE 平台</div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var LIFF_ID = '2009530264-3xA9VL4a';

// Parse URL params
var params = new URLSearchParams(location.search);
var page = params.get('page') || 'order';

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    // If not logged in, redirect to LINE login
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    // Get profile and token
    var profile = await liff.getProfile();
    var accessToken = liff.getAccessToken() || '';
    var userId = profile.userId;
    var displayName = profile.displayName;
    var pictureUrl = profile.pictureUrl || '';

    // Store in sessionStorage for sub-pages (GitHub Pages allows this)
    try {
      sessionStorage.setItem('liff_token', accessToken);
      sessionStorage.setItem('liff_uid', userId);
      sessionStorage.setItem('liff_name', displayName);
      sessionStorage.setItem('liff_pic', pictureUrl);
    } catch(e) {}

    // Navigate to the appropriate page
    var baseUrl = location.origin + location.pathname.replace(/index\.html$/, '').replace(/\/$/, '');
    if (page === 'member') {
      location.replace(baseUrl + '/member.html');
    } else {
      location.replace(baseUrl + '/order.html');
    }

  } catch (e) {
    document.getElementById('app').innerHTML = 
      '<div class="error">' +
      '<div class="icon">⚠️</div>' +
      '<h2>連線失敗</h2>' +
      '<p>無法連線到 LINE 平台<br>請確認網路連線後重試</p>' +
      '<a class="btn" href="' + location.href + '">重新載入</a>' +
      '</div>';
  }
}

init();
</script>
</body>
</html>
