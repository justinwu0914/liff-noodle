}
// Debug panel: only shows when URL has ?debug=1
(function(){

})();

var LID='2009530264-3xA9VL4a',SURL='https://n8n.justinaiauto.com/webhook/food-order-submit';
// SHOP_UID & LTOKEN moved to n8n backend for security
var M=[{id:'oyster',nm:'й®®иҡөйәөз·ҡ',ds:'ж–°й®®иҡөд»”жҗӯй…Қйәөз·ҡ',L:65,S:60,top:1},{id:'mixed',nm:'з¶ңеҗҲйәөз·ҡ',ds:'й®®иҡөпјӢж»·иЈҪиұ¬и…ёжҗӯй…Қйәөз·ҡ',L:65,S:60,top:1},{id:'intestine',nm:'иұ¬и…ёйәөз·ҡ',ds:'ж»·иЈҪиұ¬и…ёжҗӯй…Қйәөз·ҡ',L:60,S:55,top:1},{id:'plain',nm:'жё…йәөз·ҡ',ds:'зҙ”йәөз·ҡж№Ҝеә•',L:45,S:40,top:0}];
var CD=['йҰҷиҸң','йҶ¬жІ№','зғҸйҶӢ','и’ңи“ү'],SP=['дёҚеҠ иҫЈ','еҫ®иҫЈ','е°ҸиҫЈ','дёӯиҫЈ','еӨ§иҫЈ'],TP=[{nm:'еҠ иұ¬и…ё',p:30},{nm:'еҠ й®®иҡө',p:30}];

var cart=[],uid='',uname='',orderId='',orderDT='',custName='',groupId='',groupInfo=null;
function genOID(){var n=new Date(),ds=''+n.getFullYear()+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0');var sq=String(n.getHours())+String(n.getMinutes()).padStart(2,'0')+String(n.getSeconds()).padStart(2,'0');var rnd='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';var r='';for(var i=0;i<3;i++)r+=rnd[Math.floor(Math.random()*rnd.length)];return 'ORD-'+ds+'-'+sq+'-'+r;}
function fmtDT(){var n=new Date();return n.getFullYear()+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
var accessToken='';async function init(){
dlog('вҡҷпёҸ init() start');
try{accessToken=sessionStorage.getItem('liff_token')||'';uid=sessionStorage.getItem('liff_uid')||'';uname=sessionStorage.getItem('liff_name')||'';}catch(e){}
dlog('рҹ’ҫ from sessionStorage: token='+(accessToken?'YES':'NO')+' uid='+(uid||'(none)')+' name='+(uname||'(none)'));

if(!accessToken){
  dlog('рҹ”‘ no token, trying LIFF init...');
  try{
    await liff.init({liffId:LID});
    dlog('вң… LIFF init OK, isLoggedIn='+liff.isLoggedIn()+', isInClient='+liff.isInClient());

      uid=p.userId;uname=p.displayName;accessToken=liff.getAccessToken()||'';
      dlog('вң… profile: '+uname+' token='+(accessToken?'YES':'NO'));
      try{sessionStorage.setItem('liff_token',accessToken);sessionStorage.setItem('liff_uid',uid);sessionStorage.setItem('liff_name',uname);}catch(se){}

      liff.login({redirectUri:loginUrl});
      return;
    }
  }catch(e){dlog('вқҢ LIFF init error: '+e.message);}
}else{
  dlog('вң… token from sessionStorage, skip LIFF init');

  try{await liff.init({liffId:LID});dlog('вң… LIFF late init OK');}catch(e){dlog('вҡ пёҸ LIFF late init skip: '+e.message);}
}

document.getElementById('oidD').textContent=orderId;
document.getElementById('odtD').textContent=orderDT;

}
function render(){
var nm=custName||uname||'';
document.getElementById('app').innerHTML='<div class="nsec"><div class="nlbl">рҹ‘Ө еҸ–йӨҗе§“еҗҚпјҲеҝ…еЎ«пјү</div><div class="nwrap"><input type="text" id="cname" placeholder="и«Ӣијёе…ҘжӮЁзҡ„е§“еҗҚ" maxlength="20" value="'+nm.replace(/"/g,'&quot;')+'" oninput="custName=this.value.trim();document.getElementById(\x27nerr\x27).style.display=\x27none\x27;rc();"></div><div class="nerr" id="nerr">вҡ  и«Ӣијёе…ҘеҸ–йӨҗе§“еҗҚжүҚиғҪйҖҒеҮәиЁӮе–®</div></div><div class="sec">йҒёж“Үе“Ғй …еҠ е…Ҙиіјзү©и»Ҡ</div><div class="grid">'+M.map(m=>'<div class="mc"><div class="nm">'+m.nm+'</div><div class="ds">'+m.ds+'</div><div class="sr"><div class="sb on" onclick="add(\x27'+m.id+'\x27,\x27е°Ҹзў—\x27)">е°Ҹзў— $'+m.S+'</div><div class="sb" onclick="add(\x27'+m.id+'\x27,\x27еӨ§зў—\x27)">еӨ§зў— $'+m.L+'</div></div></div>').join('')+'</div><div id="ca"></div>';

}
function add(id,sz){var m=M.find(x=>x.id===id);cart.push({uid:Date.now(),mid:id,nm:m.nm,sz:sz,qty:1,cd:{йҰҷиҸң:1,йҶ¬жІ№:1,зғҸйҶӢ:1,и’ңи“ү:1},sp:'дёҚеҠ иҫЈ',tp:{еҠ иұ¬и…ё:0,еҠ й®®иҡө:0},canTop:m.top});rc();setTimeout(function(){document.getElementById('ca').scrollIntoView({behavior:'smooth'});},100);}
function del(u){cart=cart.filter(c=>c.uid!==u);rc();}
function cq(u,d){var it=cart.find(c=>c.uid===u);if(it)it.qty=Math.max(1,Math.min(99,it.qty+d));rc();}
function tc(u,cd){var it=cart.find(c=>c.uid===u);if(it)it.cd[cd]=it.cd[cd]?0:1;rc();}
function ss(u,sp){var it=cart.find(c=>c.uid===u);if(it)it.sp=sp;rc();}
function st(u,tn,v){var it=cart.find(c=>c.uid===u);if(it)it.tp[tn]=parseInt(v)||0;rc();}
function pr2(it){var m=M.find(x=>x.id===it.mid);var base=it.sz==='еӨ§зў—'?m.L:m.S;var topP=Object.values(it.tp).reduce((s,v)=>s+v*30,0);return(base+topP)*it.qty;}
function ta(){return cart.reduce((s,i)=>s+pr2(i),0);}
function tb(){return cart.reduce((s,i)=>s+i.qty,0);}
function sumText(it){var rm=CD.filter(c=>!it.cd[c]);var cT=rm.length?'еҺ»'+rm.join('гҖҒ'):'е…ЁеҠ ';var sT=it.sp==='дёҚеҠ иҫЈ'?'дёҚиҫЈ':it.sp;var tps=[];for(var k in it.tp)if(it.tp[k]>0)tps.push(k+'x'+it.tp[k]);return cT+' / '+sT+(tps.length?' / '+tps.join('гҖҒ'):'');}
function rc(){
var a=document.getElementById('ca'),bw=tb(),tt=ta();

var btn=document.getElementById('sbtn');

}

cart.forEach(function(it){

function closeLiff(){try{if(liff.isInClient()){liff.closeWindow();return;}}catch(e){}try{window.close();}catch(e){}document.querySelector('.fbtn').textContent='и«ӢжүӢеӢ•й—ңй–үжӯӨеҲҶй Ғ';document.querySelector('.fbtn').style.background='#999';}
init();

// === Group Order Detection (runs after init completes) ===
setTimeout(function(){
  try{
    dlog('рҹ”Қ [GROUP] starting detection...');
    var p=new URLSearchParams(window.location.search);
    var g=p.get('group')||'';
    dlog('рҹ”Қ [GROUP] from URL search: "'+(g||'')+'"');
    // fallback: hash fragment
    if(!g){try{var h=window.location.hash;if(h&&h.indexOf('group=')!==-1){g=new URLSearchParams(h.substring(h.indexOf('?'))).get('group')||'';dlog('рҹ”Қ [GROUP] from hash: "'+g+'"');}}catch(e){}}
    // fallback: sessionStorage
    if(!g){try{g=sessionStorage.getItem('liff_group')||'';if(g)dlog('рҹ”Қ [GROUP] from sessionStorage: "'+g+'"');}catch(e){}}
    // fallback: liff context
    if(!g&&typeof liff!=='undefined'){try{var ctx=liff.getContext();dlog('рҹ”Қ [GROUP] liff context: '+JSON.stringify(ctx));if(ctx&&ctx.liffUrl){g=new URL(ctx.liffUrl).searchParams.get('group')||'';if(g)dlog('рҹ”Қ [GROUP] from liffUrl: "'+g+'"');}}catch(e){dlog('рҹ”Қ [GROUP] liff context error: '+e.message);}}

    if(!g){dlog('вқҢ [GROUP] no groupId found anywhere');return;}
    dlog('вң… [GROUP] groupId = '+g);
    groupId=g;
    try{sessionStorage.setItem('liff_group',g);}catch(e){}

    // STEP 1: з«ӢеҚійЎҜзӨәеҹәжң¬ж©«е№…пјҲдёҚзӯү n8nпјү
    function showBanner(title, detail){
      var existing=document.getElementById('group-banner');
      if(existing)existing.remove();
      var gb=document.createElement('div');
      gb.id='group-banner';
      gb.style.cssText='background:linear-gradient(135deg,#FFF0E8,#FFE0D0);padding:14px 16px;margin:12px 16px 4px;border-radius:14px;text-align:center;border:2px solid #F0C8B0';
      gb.innerHTML='<div style="font-size:15px;font-weight:700;color:#D85A30">'+title+'</div><div style="font-size:12px;color:#888;margin-top:4px">'+detail+'</div>';
      var hd=document.querySelector('.obar');
      if(hd&&hd.nextSibling){hd.parentNode.insertBefore(gb,hd.nextSibling);dlog('вң… [GROUP] banner inserted after .obar');}
      else{var app=document.getElementById('app');if(app){app.parentNode.insertBefore(gb,app);dlog('вң… [GROUP] banner inserted before #app');}
      else{dlog('вқҢ [GROUP] cannot find .obar or #app');}}
    }

    showBanner('рҹҺү жҸӘеңҳй»һйӨҗжЁЎејҸ', 'жҸӘеңҳд»Јзўј: '+g+' | ж»ҝ 5 зў—дә« 95 жҠҳ | жҹҘи©ўдёӯ...');

    // STEP 2: еҳ—и©Ұеҗ‘ n8n еҸ–еҫ—жҸӘеңҳи©іжғ…
    if(!accessToken){dlog('вҡ пёҸ [GROUP] no accessToken, skip fetch');return;}
    dlog('рҹ“Ў [GROUP] fetch: '+GROUP_JOIN_URL);
    fetch(GROUP_JOIN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'group_join',groupId:g,accessToken:accessToken})})
    .then(function(r){dlog('рҹ“Ў [GROUP] status='+r.status+' type='+r.headers.get('content-type'));return r.text();})
    .then(function(txt){
      dlog('рҹ“Ў [GROUP] raw response(100): '+txt.substring(0,100));
      var d;
      try{d=JSON.parse(txt);}catch(pe){
        dlog('вқҢ [GROUP] JSON parse fail, response is not JSON');
        showBanner('рҹҺү жҸӘеңҳй»һйӨҗжЁЎејҸ', 'жҸӘеңҳд»Јзўј: '+g+' | ж»ҝ 5 зў—дә« 95 жҠҳ');
        return;
      }
      dlog('рҹ“Ў [GROUP] parsed: '+JSON.stringify(d).substring(0,200));
      if(d.success){
        groupInfo=d;
        showBanner(
          'рҹҺү дҪ жӯЈеңЁеҸғеҠ  '+(d.hostName||'еҘҪеҸӢ')+' зҡ„жҸӘеңҳ',
          'зӣ®еүҚ '+(d.totalMembers||'?')+' дәә / '+(d.totalBowls||'?')+' зў— | ж»ҝ 5 зў—дә« 95 жҠҳ'
        );
      }else{dlog('вҡ пёҸ [GROUP] success:false вҖ” '+(d.message||''));}
    }).catch(function(err){dlog('вқҢ [GROUP] fetch err: '+err);});
  }catch(e){dlog('вқҢ [GROUP] outer err: '+e.message);}
},500);
</script>
