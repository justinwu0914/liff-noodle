<!-- ════════════════════════════════════════════════════════
  位置 A：在 </style> 結束標籤前插入活動 CSS
  搜尋：</style>
  在它前面插入以下 CSS
════════════════════════════════════════════════════════ -->
<style id="promo-styles">
/* ── 活動橫幅 ── */
.promo-banner-container { margin: 0 0 12px; }
.promo-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px; margin-bottom: 8px;
  font-size: 13px; animation: promoBannerIn 0.3s ease;
}
.promo-banner--orange { background: #fff3e0; border-left: 4px solid #ff9800; }
.promo-banner--green  { background: #e8f5e9; border-left: 4px solid #4caf50; }
.promo-banner--red    { background: #fce4ec; border-left: 4px solid #e91e63; }
.promo-banner--purple { background: #f3e5f5; border-left: 4px solid #9c27b0; }
.promo-banner__icon { font-size: 18px; flex-shrink: 0; }
.promo-banner__text { flex: 1; line-height: 1.4; }
.promo-banner__text strong { display: block; font-weight: 600; }
.promo-banner__end { font-size: 11px; color: #999; white-space: nowrap; }
/* ── 品項活動標籤 ── */
.item-promo-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 4px; margin-left: 4px; vertical-align: middle;
}
.item-promo-tag--green { background: #e8f5e9; color: #2e7d32; }
.item-promo-tag--orange{ background: #fff3e0; color: #e65100; }
.item-promo-tag--purple{ background: #f3e5f5; color: #6a1b9a; }
/* ── 揪團進度條 ── */
.group-progress { padding: 10px 14px; background: #fff8e1; border-radius: 10px; margin-bottom: 8px; }
.group-progress--success { background: #e8f5e9; }
.group-progress__info { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.group-progress__bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
.group-progress__bar-fill { height: 100%; background: linear-gradient(90deg, #ff9800, #f44336); border-radius: 4px; transition: width 0.5s ease; }
/* ── 購物車活動摘要 ── */
.cart-promo-summary .promo-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
.cart-promo-summary .promo-row--discount { color: #e53935; }
.cart-promo-summary .promo-row--points   { color: #388e3c; }
.cart-promo-summary .promo-row--redeem   { color: #7b1fa2; }
.cart-promo-summary .promo-row--total    { font-size: 15px; font-weight: 600; border-bottom: none; padding-top: 8px; }
@keyframes promoBannerIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
</style>

<!-- ════════════════════════════════════════════════════════
  位置 B：在菜單容器最上方插入活動橫幅容器

  在它裡面的最開頭插入：
════════════════════════════════════════════════════════ -->

════════════════════════════════════════════════════════ -->

<!-- ════════════════════════════════════════════════════════
  位置 E：在 </body> 前插入活動 JavaScript
  搜尋：</body>
  在它前面插入以下整段 <script>
════════════════════════════════════════════════════════ -->
<script>
// ── 全域活動狀態 ─────────────────────────────────────────
window.activePromos = { groupBoost: null, bonusPoints: [], redeemPromo: null };

// ── 格式化日期 ───────────────────────────────────────────
function formatPromoDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ── 載入活動資料 ─────────────────────────────────────────
async function loadActivePromos() {
  try {
    const accessToken = liff.getAccessToken();
    const res = await fetch('/webhook/admin-api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_active_promos', accessToken })
    });
    const data = await res.json();
    if (data.promos) {
      window.activePromos.groupBoost  = data.promos.find(p => p.promo_type === 'group_boost') || null;
      window.activePromos.bonusPoints = data.promos.filter(p => p.promo_type === 'bonus_points');
      window.activePromos.redeemPromo = data.promos.find(p => p.promo_type === 'redeem_promo') || null;
    }
  } catch(e) {
    console.warn('[活動] 載入失敗，使用預設值', e);
  }
}

// ── 渲染活動橫幅 ─────────────────────────────────────────
function renderPromoBanner() {
  const container = document.getElementById('promo-banner-container');
  if (!container) return;
  const banners = [];

  // 揪團加碼
  if (window.activePromos.groupBoost) {
    const p = window.activePromos.groupBoost;
    const minBowls = p.group_min_bowls || 5;
    const pct = Math.round((p.group_discount_rate || 0.95) * 100);
    const badge = p.display_badge || '🎉 揪團加碼';
    banners.push(`
      <div class="promo-banner promo-banner--orange">
        <span class="promo-banner__icon">${badge.split(' ')[0]}</span>
        <div class="promo-banner__text">
          <strong>${badge.replace(/^\S+\s*/, '')}</strong>
          揪 ${minBowls} 碗以上享 ${pct} 折！
        </div>
        <span class="promo-banner__end">至 ${formatPromoDate(p.end_date)}</span>
      </div>`);
  }

  // 加贈積分
  window.activePromos.bonusPoints.forEach(p => {
    const badge = p.display_badge || '⭐ 積分活動';
    const color = p.display_color || 'green';
    let desc = '';
    if (p.points_multiplier > 1 && !p.target_items) {
      desc = `全館 ${p.points_multiplier} 倍積分！`;
    } else if (p.spend_threshold > 0) {
      desc = `消費滿 $${p.spend_threshold} 額外贈 ${p.spend_bonus_points} 點！`;
    } else if (p.bonus_points_per_item > 0 && p.target_items) {
      desc = `指定品項每份加贈 ${p.bonus_points_per_item} 積分！`;
    }
    if (desc) {
      banners.push(`
        <div class="promo-banner promo-banner--${color}">
          <span class="promo-banner__icon">${badge.split(' ')[0]}</span>
          <div class="promo-banner__text">
            <strong>${badge.replace(/^\S+\s*/, '')}</strong>
            ${desc}
          </div>
          <span class="promo-banner__end">至 ${formatPromoDate(p.end_date)}</span>
        </div>`);
    }
  });

  // 積分兌換連動
  if (window.activePromos.redeemPromo) {
    const p = window.activePromos.redeemPromo;
    const pts = p.redeem_points_required || 50;
    const item = p.redeem_item_name || '豬腸麵線(小)';
    banners.push(`
      <div class="promo-banner promo-banner--purple">
        <span class="promo-banner__icon">🎫</span>
        <div class="promo-banner__text">
          <strong>限時積分優惠</strong>
          ${pts} 點即可兌換 ${item}！
        </div>
        <span class="promo-banner__end">至 ${formatPromoDate(p.end_date)}</span>
      </div>`);
  }

  container.innerHTML = banners.join('') || '';
}

// ── 取得品項活動標籤（插入菜單品項 HTML 用）───────────────
function getItemPromoTag(itemName) {
  const tags = [];
  window.activePromos.bonusPoints.forEach(p => {
    if (!p.target_items) return;
    const targets = p.target_items.split(',').map(s => s.trim());
    if (targets.includes(itemName) && p.bonus_points_per_item > 0) {
      const badge = p.display_badge || `+${p.bonus_points_per_item}pts`;
      const color = p.display_color === 'orange' ? 'orange' : p.display_color === 'purple' ? 'purple' : 'green';
      tags.push(`<span class="item-promo-tag item-promo-tag--${color}">${badge}</span>`);
    }
  });
  return tags.join('');
}

// ── 揪團進度條 ───────────────────────────────────────────
function renderGroupProgress(currentBowls) {
  const container = document.getElementById('group-progress-container');
  if (!container) return;
  const minBowls = window.activePromos.groupBoost?.group_min_bowls || 5;
  const discountRate = window.activePromos.groupBoost?.group_discount_rate || 0.95;
  const pct = Math.round(discountRate * 100);
  const remaining = Math.max(0, minBowls - currentBowls);
  const progressPct = Math.min(100, Math.round((currentBowls / minBowls) * 100));

  if (currentBowls >= minBowls) {
    container.innerHTML = `
      <div class="group-progress group-progress--success">
        <div class="group-progress__info">
          <span>🎉 已達標！共 <strong>${currentBowls} 碗</strong>，享 <strong>${pct} 折</strong>！</span>
        </div>
        <div class="group-progress__bar">
          <div class="group-progress__bar-fill" style="width:100%"></div>
        </div>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="group-progress">
        <div class="group-progress__info">
          <span>🧑‍🤝‍🧑 再揪 <strong>${remaining} 碗</strong> 享 ${pct} 折</span>
          <span>${currentBowls} / ${minBowls} 碗</span>
        </div>
        <div class="group-progress__bar">
          <div class="group-progress__bar-fill" style="width:${progressPct}%"></div>
        </div>
      </div>`;
  }
}

// ── 購物車活動摘要 ────────────────────────────────────────
// 呼叫時機：計算完購物車後呼叫，傳入計算結果
// cartCalc 格式：{ originalAmount, discountedAmount, discountSaved, discountRate,
//                  basePoints, pointsMultiplier, totalEarnedPoints, totalBonusPoints,
//                  redeemItem, redeemPointsCost }
function renderCartPromoSummary(cartCalc) {
  const container = document.getElementById('cart-promo-summary');
  if (!container || !cartCalc) return;
  const rows = [];

  if (cartCalc.discountSaved > 0) {
    rows.push(`<div class="promo-row promo-row--discount">
      <span>${Math.round((cartCalc.discountRate||0.95)*100)} 折優惠</span>
      <span>- $${cartCalc.discountSaved}</span>
    </div>`);
  }
  if (cartCalc.totalEarnedPoints > 0) {
    let ptsTxt = `+ ${cartCalc.basePoints} 點`;
    if ((cartCalc.pointsMultiplier||1) > 1) ptsTxt = `+ ${Math.floor(cartCalc.basePoints * cartCalc.pointsMultiplier)} 點（${cartCalc.pointsMultiplier}×）`;
    if (cartCalc.totalBonusPoints > 0) ptsTxt += ` + ${cartCalc.totalBonusPoints} 加贈`;
    rows.push(`<div class="promo-row promo-row--points">
      <span>⭐ 本次獲得</span><span>${ptsTxt} = ${cartCalc.totalEarnedPoints} 點</span>
    </div>`);
  }
  if (cartCalc.redeemItem) {
    rows.push(`<div class="promo-row promo-row--redeem">
      <span>🎫 積分兌換</span><span>${cartCalc.redeemItem} (-${cartCalc.redeemPointsCost}點)</span>
    </div>`);
  }

  container.innerHTML = rows.join('');
}

</script>
