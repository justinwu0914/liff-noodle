// ── 全域活動狀態（從後端載入） ────────────────────────────
let activePromos = {
  groupBoost: null,     // 揪團加碼活動資料
  bonusPoints: [],      // 加贈積分活動列表
  redeemPromo: null     // 積分兌換連動活動
};

// ============================================================
// 【A】載入活動資料（在 loadMenu() 之前呼叫）
// ============================================================
async function loadActivePromos() {
  try {
    const res = await fetch('/webhook/admin-api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_active_promos' })
    });
    const data = await res.json();
    if (data.promos) {
      activePromos.groupBoost  = data.promos.find(p => p.promo_type === 'group_boost') || null;
      activePromos.bonusPoints = data.promos.filter(p => p.promo_type === 'bonus_points');
      activePromos.redeemPromo = data.promos.find(p => p.promo_type === 'redeem_promo') || null;
    }
  } catch (e) {
    console.warn('載入活動資料失敗，使用預設值', e);
  }
}

// ============================================================
// 【B】活動橫幅（插入菜單頁頂部）
// 呼叫時機：loadMenu() 成功後呼叫 renderPromoBanner()
// ============================================================
function renderPromoBanner() {
  const container = document.getElementById('promo-banner-container');
  if (!container) return;

  const banners = [];

  // 揪團加碼橫幅
  if (activePromos.groupBoost) {
    const p = activePromos.groupBoost;
    const minBowls = p.group_min_bowls || 5;
    const pct = Math.round((p.group_discount_rate || 0.95) * 100);
    const badge = p.display_badge || '🎉 揪團加碼';
    const color = p.display_color || 'orange';
    banners.push(`
      <div class="promo-banner promo-banner--${color}">
        <span class="promo-banner__icon">${badge.split(' ')[0]}</span>
        <span class="promo-banner__text">
          <strong>${badge.replace(/^[^\s]+\s/, '')}</strong>
          揪 ${minBowls} 碗以上享 ${pct} 折！
        </span>
        <span class="promo-banner__end">
          活動至 ${formatDate(p.end_date)}
        </span>
      </div>
    `);
  }

  // 加贈積分橫幅
  activePromos.bonusPoints.forEach(p => {
    const badge = p.display_badge || '⭐ 積分活動';
    const color = p.display_color || 'green';
    let desc = '';
    if (p.points_multiplier > 1 && !p.target_items) {
      desc = `全館 ${p.points_multiplier} 倍積分！`;
    } else if (p.spend_threshold > 0) {
      desc = `消費滿 $${p.spend_threshold} 額外贈 ${p.spend_bonus_points} 點！`;
    } else if (p.bonus_points_per_item > 0) {
      desc = `指定品項每份額外加贈 ${p.bonus_points_per_item} 積分！`;
    }
    if (desc) {
      banners.push(`
        <div class="promo-banner promo-banner--${color}">
          <span class="promo-banner__icon">${badge.split(' ')[0]}</span>
          <span class="promo-banner__text">
            <strong>${badge.replace(/^[^\s]+\s/, '')}</strong>
            ${desc}
          </span>
          <span class="promo-banner__end">
            活動至 ${formatDate(p.end_date)}
          </span>
        </div>
      `);
    }
  });

  // 積分兌換連動橫幅
  if (activePromos.redeemPromo) {
    const p = activePromos.redeemPromo;
    const pts = p.redeem_points_required || 50;
    const item = p.redeem_item_name || '豬腸麵線(小)';
    banners.push(`
      <div class="promo-banner promo-banner--purple">
        <span class="promo-banner__icon">🎫</span>
        <span class="promo-banner__text">
          <strong>限時積分優惠</strong>
          ${pts} 點即可兌換 ${item}！
        </span>
        <span class="promo-banner__end">
          活動至 ${formatDate(p.end_date)}
        </span>
      </div>
    `);
  }

  container.innerHTML = banners.join('') || '';
}

// ============================================================
// 【C】菜單品項活動標籤（整合至 renderMenuItem()）
// 在原本 renderMenuItem() 函式中找到品項卡片 HTML，插入以下標籤邏輯
// ============================================================
function getItemPromoTag(itemName) {
  const tags = [];

  // 指定品項加贈積分標籤
  activePromos.bonusPoints.forEach(p => {
    if (!p.target_items) return;
    const targets = p.target_items.split(',').map(s => s.trim());
    if (targets.includes(itemName) && p.bonus_points_per_item > 0) {
      const badge = p.display_badge || `+${p.bonus_points_per_item}pts`;
      tags.push(`<span class="item-promo-tag item-promo-tag--green">${badge}</span>`);
    }
  });

  return tags.join('');
}

// ============================================================
// 【D】揪團頁面：差幾碗達標提示（整合至 renderGroupStatus()）
// ============================================================
function renderGroupProgress(currentBowls) {
  const container = document.getElementById('group-progress-container');
  if (!container) return;

  // 取得當前有效門檻（活動覆蓋或預設 5 碗）
  const minBowls = activePromos.groupBoost?.group_min_bowls || 5;
  const discountRate = activePromos.groupBoost?.group_discount_rate || 0.95;
  const discountPct  = Math.round(discountRate * 100);
  const remaining    = Math.max(0, minBowls - currentBowls);

  if (currentBowls >= minBowls) {
    // 已達標
    container.innerHTML = `
      <div class="group-progress group-progress--success">
        <span class="group-progress__icon">🎉</span>
        <span class="group-progress__text">
          已達標！共 <strong>${currentBowls} 碗</strong>，享 <strong>${discountPct} 折</strong> 優惠
        </span>
      </div>
    `;
  } else {
    // 未達標
    const progressPct = Math.min(100, Math.round((currentBowls / minBowls) * 100));
    container.innerHTML = `
      <div class="group-progress">
        <div class="group-progress__info">
          <span>🧑‍🤝‍🧑 再揪 <strong>${remaining} 碗</strong> 就能享 ${discountPct} 折！</span>
          <span class="group-progress__count">${currentBowls} / ${minBowls} 碗</span>
        </div>
        <div class="group-progress__bar">
          <div class="group-progress__bar-fill" style="width: ${progressPct}%"></div>
        </div>
      </div>
    `;
  }
}

// ============================================================
// 【E】購物車：活動折扣與積分預覽（整合至 renderCartSummary()）
// ============================================================
function renderCartPromoSummary(cartData) {
  // cartData 為 WF-02 回傳的計算結果
  const container = document.getElementById('cart-promo-summary');
  if (!container || !cartData) return;

  const rows = [];

  // 原始金額
  rows.push(`
    <div class="cart-summary-row">
      <span>小計</span>
      <span>$${cartData.originalAmount}</span>
    </div>
  `);

  // 揪團折扣
  if (cartData.discountSaved > 0) {
    rows.push(`
      <div class="cart-summary-row cart-summary-row--discount">
        <span>${cartData.discountRate < 1 ? `揪團 ${Math.round(cartData.discountRate * 100)} 折` : '折扣'}</span>
        <span>- $${cartData.discountSaved}</span>
      </div>
    `);
  }

  // 應付金額
  rows.push(`
    <div class="cart-summary-row cart-summary-row--total">
      <span><strong>應付金額</strong></span>
      <span><strong>$${cartData.discountedAmount}</strong></span>
    </div>
  `);

  // 積分預覽
  if (cartData.totalEarnedPoints > 0) {
    let pointsText = `+ ${cartData.basePoints} 積分`;
    if (cartData.pointsMultiplier > 1) {
      pointsText = `+ ${cartData.multipliedPoints} 積分（${cartData.pointsMultiplier} 倍）`;
    }
    if (cartData.totalBonusPoints > 0) {
      pointsText += ` + ${cartData.totalBonusPoints} 加贈`;
    }
    rows.push(`
      <div class="cart-summary-row cart-summary-row--points">
        <span>⭐ 本次獲得</span>
        <span class="points-preview">${pointsText} = ${cartData.totalEarnedPoints} 點</span>
      </div>
    `);
  }

  // 積分兌換
  if (cartData.redeemItem) {
    rows.push(`
      <div class="cart-summary-row cart-summary-row--redeem">
        <span>🎫 積分兌換</span>
        <span>${cartData.redeemItem} (- ${cartData.redeemPointsCost} 點)</span>
      </div>
    `);
  }

  container.innerHTML = rows.join('');
}

// ── 工具函式 ────────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
