<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>會員中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0eb;color:#333;padding-bottom:40px}
.hd{background:#D85A30;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;text-align:center}
.hd h1{font-size:20px;font-weight:700}
.hd .sub{font-size:12px;opacity:.8;margin-top:2px}
.card{background:#fff;border-radius:14px;margin:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.avatar{text-align:center;margin-bottom:16px}
.avatar img{width:72px;height:72px;border-radius:50%;border:3px solid #D85A30}
.avatar .name{font-size:17px;font-weight:700;margin-top:8px}
.avatar .uid{font-size:11px;color:#aaa;margin-top:2px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:#888;margin-bottom:6px}
.field label .req{color:#D85A30}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:2px solid #eee;border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:#333;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#D85A30}
.field textarea{height:60px;resize:none}
.field .hint{font-size:11px;color:#aaa;margin-top:4px}
.field .err{font-size:11px;color:#A32D2D;margin-top:4px;display:none}
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-primary{background:#D85A30;color:#fff}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{background:#ccc}
.btn-secondary{background:#fff;color:#D85A30;border:2px solid #D85A30;margin-top:8px}
.btn-secondary:active{opacity:.8}
.ok{text-align:center;padding:40px 20px}
.ok .ic{font-size:60px;margin-bottom:12px}
.ok h2{font-size:22px;margin-bottom:8px}
.ok p{color:#888;font-size:14px;line-height:1.6}
.ok .pts{display:inline-block;background:#FFF5F0;color:#D85A30;font-size:24px;font-weight:800;padding:8px 24px;border-radius:12px;margin:12px 0}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.info-row:last-child{border:none}
.info-row .k{color:#888}
.info-row .v{font-weight:600;color:#333}
.info-row .v.accent{color:#D85A30}
.edit-link{text-align:center;margin-top:12px;font-size:13px;color:#D85A30;font-weight:600;cursor:pointer}
.loading{text-align:center;padding:80px 20px;color:#999}
</style>
</head>
<body>
<div class="hd"><h1>🍜 麵線會員中心</h1><div class="sub">加入會員享專屬優惠</div></div>
<div id="app"><div class="loading">載入中...</div></div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var LID='2009530264-3xA9VL4a';
var CHECK_URL='https://n8n.justinaiauto.com/webhook/member-check';
var SUBMIT_URL='https://n8n.justinaiauto.com/webhook/member-register';
var accessToken='',uid='',uname='',upic='';
try{accessToken=sessionStorage.getItem('liff_token')||'';uid=sessionStorage.getItem('liff_uid')||'';uname=sessionStorage.getItem('liff_name')||'';upic=sessionStorage.getItem('liff_pic')||'';}catch(e){}
var memberData=null;
var mode='loading';

async function init(){
  try{
    await liff.init({liffId:LID});if(liff.isLoggedIn()){var p=await liff.getProfile();uid=p.userId;uname=p.displayName;upic=p.pictureUrl||'';accessToken=liff.getAccessToken()||'';}
  }catch(e){}
  // no blocking - always proceed to check or register
  if(accessToken){showPage('loading');try{var res=await fetch(CHECK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:accessToken})});var d=await res.json();if(d.registered){memberData=d;showPage('member-center');}else{showPage('register');}}catch(e){showPage('register');}}else{showPage('register');}
}

function showPage(p){
  mode=p;var app=document.getElementById('app');
  if(p==='loading'){app.innerHTML='<div class="loading">\u8f09\u5165\u4e2d...</div>';}
  else if(p==='no-login'){app.innerHTML='<div class="ok"><div class="ic">\ud83d\udd12</div><h2>\u8acb\u5f9e LINE \u958b\u555f</h2><p>\u8acb\u900f\u904e LINE App \u958b\u555f\u6b64\u9801\u9762\u4ee5\u9032\u884c\u6703\u54e1\u8a3b\u518a</p></div>';}
  else if(p==='register'){showRegisterForm();}
  else if(p==='member-center'){showMemberCenter();}
  else if(p==='edit'){showEditForm();}
}

function showRegisterForm(){
  var app=document.getElementById('app');
  app.innerHTML='<div class="card"><div class="avatar">'+(upic?'<img src="'+upic+'">':'')+'<div class="name">'+uname+'</div><div class="uid">\u6b61\u8fce\u52a0\u5165\u6703\u54e1</div></div>'
    +'<div class="field"><label>\u771f\u5be6\u59d3\u540d <span class="req">*</span></label><input type="text" id="rname" placeholder="\u8acb\u8f38\u5165\u60a8\u7684\u59d3\u540d" maxlength="20"><div class="err" id="enm">\u8acb\u8f38\u5165\u59d3\u540d</div></div>'
    +'<div class="field"><label>\u806f\u7d61\u96fb\u8a71 <span class="req">*</span></label><input type="tel" id="rphone" placeholder="09XX-XXX-XXX" maxlength="15"><div class="err" id="eph">\u8acb\u8f38\u5165\u6b63\u78ba\u7684\u96fb\u8a71\u865f\u78bc</div></div>'
    +'<div class="field"><label>\u751f\u65e5\u6708\u4efd\uff08\u58fd\u661f\u512a\u60e0\uff09</label><select id="rbday"><option value="">\u8acb\u9078\u64c7</option><option value="1\u6708">1\u6708</option><option value="2\u6708">2\u6708</option><option value="3\u6708">3\u6708</option><option value="4\u6708">4\u6708</option><option value="5\u6708">5\u6708</option><option value="6\u6708">6\u6708</option><option value="7\u6708">7\u6708</option><option value="8\u6708">8\u6708</option><option value="9\u6708">9\u6708</option><option value="10\u6708">10\u6708</option><option value="11\u6708">11\u6708</option><option value="12\u6708">12\u6708</option></select></div>'
    +'<div class="field"><label>\u98f2\u98df\u504f\u597d / \u904e\u654f\u539f</label><textarea id="rdiet" placeholder="\u4f8b\u5982\uff1a\u4e0d\u5403\u9999\u83dc\u3001\u6d77\u9bae\u904e\u654f..."></textarea><div class="hint">\u8b93\u6211\u5011\u66f4\u597d\u5730\u670d\u52d9\u60a8</div></div>'
    +'<button class="btn btn-primary" onclick="doRegister()">\u2705 \u78ba\u8a8d\u8a3b\u518a</button></div>';
}

function showMemberCenter(){
  var d=memberData;var app=document.getElementById('app');
  app.innerHTML='<div class="card"><div class="avatar">'+(upic?'<img src="'+upic+'">':'')+'<div class="name">'+(d.real_name||uname)+'</div><div class="uid">\u6703\u54e1\u7de8\u865f #'+(d.member_id||'---')+'</div></div>'
    +'<div class="info-row"><span class="k">\u96fb\u8a71</span><span class="v">'+(d.phone||'---')+'</span></div>'
    +'<div class="info-row"><span class="k">\u751f\u65e5\u6708\u4efd</span><span class="v">'+(d.birthday_month||'---')+'</span></div>'
    +'<div class="info-row"><span class="k">\u98f2\u98df\u504f\u597d</span><span class="v">'+(d.dietary_preferences||'---')+'</span></div>'
    +'<div class="info-row"><span class="k">\u7d2f\u8a08\u9ede\u6578</span><span class="v accent">'+(d.total_points||0)+' \u9ede</span></div>'
    +'<div class="info-row"><span class="k">\u6703\u54e1\u7b49\u7d1a</span><span class="v accent">'+(d.level||'\u4e00\u822c\u6703\u54e1')+'</span></div>'
    +'<div class="edit-link" onclick="showPage(\x27edit\x27)">\u270f\ufe0f \u4fee\u6539\u500b\u4eba\u8cc7\u6599</div></div>'
    +'<div style="padding:0 16px"><button class="btn btn-secondary" onclick="closePage()">\u95dc\u9589</button></div>';
}

function showEditForm(){
  var d=memberData||{};var app=document.getElementById('app');
  app.innerHTML='<div class="card"><div class="avatar">'+(upic?'<img src="'+upic+'">':'')+'<div class="name">\u4fee\u6539\u500b\u4eba\u8cc7\u6599</div></div>'
    +'<div class="field"><label>\u771f\u5be6\u59d3\u540d <span class="req">*</span></label><input type="text" id="rname" value="'+(d.real_name||'').replace(/"/g,'&quot;')+'" maxlength="20"><div class="err" id="enm">\u8acb\u8f38\u5165\u59d3\u540d</div></div>'
    +'<div class="field"><label>\u806f\u7d61\u96fb\u8a71 <span class="req">*</span></label><input type="tel" id="rphone" value="'+(d.phone||'')+'" maxlength="15"><div class="err" id="eph">\u8acb\u8f38\u5165\u6b63\u78ba\u7684\u96fb\u8a71\u865f\u78bc</div></div>'
    +'<div class="field"><label>\u751f\u65e5\u6708\u4efd</label><select id="rbday">'+buildMonthOptions(d.birthday_month||'')+'</select></div>'
    +'<div class="field"><label>\u98f2\u98df\u504f\u597d / \u904e\u654f\u539f</label><textarea id="rdiet">'+(d.dietary_preferences||'')+'</textarea></div>'
    +'<button class="btn btn-primary" onclick="doUpdate()">\u2705 \u5132\u5b58\u8b8a\u66f4</button><button class="btn btn-secondary" onclick="showPage(\x27member-center\x27)">\u2b05\ufe0f \u8fd4\u56de</button></div>';
}

function buildMonthOptions(sel){var h='<option value="">\u8acb\u9078\u64c7</option>';for(var i=1;i<=12;i++){var v=i+'\u6708';h+='<option value="'+v+'"'+(sel===v?' selected':'')+'>'+v+'</option>';}return h;}

function validate(){
  var nm=document.getElementById('rname').value.trim();
  var ph=document.getElementById('rphone').value.trim();
  var ok=true;
  if(!nm){document.getElementById('enm').style.display='block';ok=false;}else{document.getElementById('enm').style.display='none';}
  if(!ph||ph.length<8){document.getElementById('eph').style.display='block';ok=false;}else{document.getElementById('eph').style.display='none';}
  return ok;
}

async function doRegister(){
  if(!validate())return;
  var btn=document.querySelector('.btn-primary');btn.disabled=true;btn.textContent='\u8655\u7406\u4e2d...';
  var data={accessToken:accessToken,action:'register',real_name:document.getElementById('rname').value.trim(),phone:document.getElementById('rphone').value.trim(),birthday_month:document.getElementById('rbday').value,dietary_preferences:document.getElementById('rdiet').value.trim()};
  try{
    var res=await fetch(SUBMIT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    var d=await res.json();
    if(d.success){
      document.getElementById('app').innerHTML='<div class="ok"><div class="ic">\ud83c\udf89</div><h2>\u6b61\u8fce\u52a0\u5165\u6703\u54e1\uff01</h2><p><strong>'+data.real_name+'</strong> \u60a8\u597d\uff0c<br>\u8a3b\u518a\u6210\u529f\uff0c\u5df2\u8d08\u9001\u9996\u6b21\u52a0\u5165\u512a\u60e0\uff01</p><div class="pts">+ 10 \u9ede</div><p>\u8acb\u67e5\u770b LINE \u8a0a\u606f\u78ba\u8a8d</p><div style="padding:16px"><button class="btn btn-primary" onclick="closePage()">\u5b8c\u6210</button></div></div>';
    }else{btn.disabled=false;btn.textContent='\u2705 \u78ba\u8a8d\u8a3b\u518a';alert(d.error||'\u8a3b\u518a\u5931\u6557');}
  }catch(e){btn.disabled=false;btn.textContent='\u2705 \u78ba\u8a8d\u8a3b\u518a';alert('\u7db2\u8def\u932f\u8aa4\uff0c\u8acb\u91cd\u8a66');}
}

async function doUpdate(){
  if(!validate())return;
  var btn=document.querySelector('.btn-primary');btn.disabled=true;btn.textContent='\u5132\u5b58\u4e2d...';
  var data={accessToken:accessToken,action:'update',real_name:document.getElementById('rname').value.trim(),phone:document.getElementById('rphone').value.trim(),birthday_month:document.getElementById('rbday').value,dietary_preferences:document.getElementById('rdiet').value.trim()};
  try{
    var res=await fetch(SUBMIT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    var d=await res.json();
    if(d.success){memberData.real_name=data.real_name;memberData.phone=data.phone;memberData.birthday_month=data.birthday_month;memberData.dietary_preferences=data.dietary_preferences;showPage('member-center');}
    else{btn.disabled=false;btn.textContent='\u2705 \u5132\u5b58\u8b8a\u66f4';alert(d.error||'\u5132\u5b58\u5931\u6557');}
  }catch(e){btn.disabled=false;btn.textContent='\u2705 \u5132\u5b58\u8b8a\u66f4';alert('\u7db2\u8def\u932f\u8aa4');}
}

function closePage(){try{if(liff.isInClient()){liff.closeWindow();return;}}catch(e){}try{window.close();}catch(e){}}

init();
</script>
</body>
</html>
