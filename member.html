<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>會員中心 — 老全麵線</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0eb;color:#333;padding-bottom:80px}
.hd{background:#D85A30;color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}
.hd h1{font-size:18px;font-weight:700;text-align:center}
.profile{background:#fff;padding:24px 20px;text-align:center;border-bottom:1px solid #eee}
.avatar{width:72px;height:72px;border-radius:50%;border:3px solid #D85A30;margin:0 auto 12px;background:#f5f0eb;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.pname{font-size:20px;font-weight:700;margin-bottom:4px}
.pmid{font-size:12px;color:#999;font-family:monospace}
.pts-card{background:linear-gradient(135deg,#D85A30,#B04520);border-radius:14px;margin:16px 20px;padding:20px;color:#fff;text-align:center}
.pts-card .lbl{font-size:12px;opacity:.8;margin-bottom:4px}
.pts-card .val{font-size:36px;font-weight:800;margin-bottom:4px}
.pts-card .sub{font-size:11px;opacity:.6}
.pts-row{display:flex;justify-content:space-around;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.pts-row .col{text-align:center}
.pts-row .col .n{font-size:18px;font-weight:700}
.pts-row .col .l{font-size:10px;opacity:.7}
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:53px;z-index:99}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;color:#999;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.on{color:#D85A30;border-bottom-color:#D85A30}
.panel{display:none;padding:12px 16px}
.panel.on{display:block}
.info-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f0eb}
.info-row:last-child{border-bottom:none}
.info-row .k{color:#888;font-size:14px}
.info-row .v{font-weight:600;font-size:14px}
.order-card{background:#fff;border-radius:12px;margin-bottom:10px;border-left:4px solid #D85A30;overflow:hidden}
.order-card.preorder{border-left-color:#BA7517}
.order-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #f5f0eb}
.order-id{font-family:monospace;font-size:12px;color:#D85A30;font-weight:600}
.order-date{font-size:12px;color:#999}
.order-body{padding:10px 14px}
.order-items{font-size:13px;color:#666;line-height:1.6}
.order-ft{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#faf8f5}
.order-ft .bowls{font-size:12px;color:#888}
.order-ft .amt{font-size:16px;font-weight:800;color:#D85A30}
.order-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:8px}
.badge-completed{background:#E1F5EE;color:#0F6E56}
.badge-preorder{background:#FAEEDA;color:#854F0B}
.empty{text-align:center;padding:40px 20px;color:#999}
.empty .ic{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}
.loading-spinner{text-align:center;padding:40px;color:#999}
.loading-spinner .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#D85A30;margin:0 4px;animation:pulse .6s infinite alternate}
.loading-spinner .dot:nth-child(2){animation-delay:.2s}
.loading-spinner .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.ft-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 20px;z-index:100}
.ft-btn{width:100%;padding:14px;background:#D85A30;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.ft-btn:active{opacity:.8}
</style>
</head>
<body>
<div class="hd"><h1>會員中心</h1></div>
<div id="app">
  <div class="loading-spinner" style="padding:80px 20px">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div style="margin-top:12px;font-size:13px">載入會員資料中...</div>
  </div>
</div>
<div class="ft-bar" id="ftbar" style="display:none">
  <button class="ft-btn" onclick="goOrder()">🍜 前往點餐</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var LIFF_ID='2009530264-3xA9VL4a';
var CHECK_URL='https://n8n.justinaiauto.com/webhook/member-check';
var HISTORY_URL='https://n8n.justinaiauto.com/webhook/order-history';
var accessToken='',memberData=null,orderData=null;

async function init(){
try{
  accessToken=sessionStorage.getItem('liff_token')||'';
  if(!accessToken){
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return;}
    accessToken=liff.getAccessToken()||'';
    var p=await liff.getProfile();
    try{sessionStorage.setItem('liff_token',accessToken);sessionStorage.setItem('liff_uid',p.userId);sessionStorage.setItem('liff_name',p.displayName);sessionStorage.setItem('liff_pic',p.pictureUrl||'');}catch(e){}
  }

  // Fetch member info
  var resp=await fetch(CHECK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:accessToken})});
  memberData=await resp.json();

  if(!memberData.registered){
    document.getElementById('app').innerHTML='<div class="empty"><div class="ic">👤</div><p>您尚未加入會員</p><p style="margin-top:8px;font-size:13px;color:#aaa">請在 LINE 聊天室輸入「加入會員」</p></div>';
    document.getElementById('ftbar').style.display='block';
    return;
  }

  renderMember();
  document.getElementById('ftbar').style.display='block';

  // Fetch order history in background
  loadHistory();

}catch(e){
  document.getElementById('app').innerHTML='<div class="empty"><div class="ic">⚠️</div><p>載入失敗，請重試</p><p style="margin-top:8px;font-size:12px;color:#ccc">'+e.message+'</p></div>';
}
}

function renderMember(){
var d=memberData;
var pic=sessionStorage.getItem('liff_pic')||'';
var avatarHtml=pic?'<img src="'+pic+'" alt="">':'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px">👤</div>';

document.getElementById('app').innerHTML=
'<div class="profile">'+
'<div class="avatar">'+avatarHtml+'</div>'+
'<div class="pname">'+d.real_name+'</div>'+
'<div class="pmid">'+(d.member_id?'MBR-'+d.member_id:'會員')+'</div>'+
'</div>'+
'<div class="pts-card">'+
'<div class="lbl">累積積分</div>'+
'<div class="val">'+d.total_points+'</div>'+
'<div class="sub">'+d.level+'</div>'+
'<div class="pts-row">'+
'<div class="col"><div class="n">'+(d.total_points>=50?Math.floor(d.total_points/50):'0')+'</div><div class="l">可兌換碗數</div></div>'+
'<div class="col"><div class="n">'+(50-d.total_points%50)+'</div><div class="l">距下次兌換</div></div>'+
'</div>'+
'</div>'+
'<div class="tabs">'+
'<div class="tab on" onclick="switchTab(0)">會員資訊</div>'+
'<div class="tab" onclick="switchTab(1)">購買記錄</div>'+
'</div>'+
'<div class="panel on" id="panel0">'+
'<div class="info-card">'+
'<div class="info-row"><span class="k">姓名</span><span class="v">'+d.real_name+'</span></div>'+
'<div class="info-row"><span class="k">電話</span><span class="v">'+(d.phone||'未設定')+'</span></div>'+
'<div class="info-row"><span class="k">生日月份</span><span class="v">'+(d.birthday_month||'未設定')+'</span></div>'+
'<div class="info-row"><span class="k">LINE 暱稱</span><span class="v">'+(d.display_name||'')+'</span></div>'+
'<div class="info-row"><span class="k">會員等級</span><span class="v">'+d.level+'</span></div>'+
'<div class="info-row"><span class="k">累積積分</span><span class="v" style="color:#D85A30">'+d.total_points+' 點</span></div>'+
'</div>'+
'<div style="text-align:center;padding:8px;font-size:11px;color:#ccc">每消費 $10 累積 1 點 | 50 點兌換豬腸麵線(小)</div>'+
'</div>'+
'<div class="panel" id="panel1">'+
'<div class="loading-spinner" id="history-loading"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><div style="margin-top:8px;font-size:13px">載入購買記錄...</div></div>'+
'<div id="history-list"></div>'+
'</div>';
}

function switchTab(n){
var tabs=document.querySelectorAll('.tab');
var panels=document.querySelectorAll('.panel');
tabs.forEach(function(t,i){t.className=i===n?'tab on':'tab';});
panels.forEach(function(p,i){p.className=i===n?'panel on':'panel';});
}

async function loadHistory(){
try{
  var resp=await fetch(HISTORY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken:accessToken})});
  orderData=await resp.json();
  renderHistory();
}catch(e){
  var el=document.getElementById('history-loading');
  if(el)el.innerHTML='<div class="empty"><div class="ic">⚠️</div><p>載入失敗</p></div>';
}
}

function renderHistory(){
var el=document.getElementById('history-loading');
if(el)el.style.display='none';
var list=document.getElementById('history-list');
if(!list)return;

if(!orderData||!orderData.success||!orderData.orders||orderData.orders.length===0){
  list.innerHTML='<div class="empty"><div class="ic">📋</div><p>尚無購買記錄</p><p style="margin-top:8px;font-size:12px;color:#aaa">下單後會自動記錄在這裡</p></div>';
  return;
}

var totalSpent=0,totalOrders=orderData.orders.length;
orderData.orders.forEach(function(o){totalSpent+=o.totalAmount;});

var html='<div class="info-card" style="text-align:center;margin-bottom:16px">'+
'<div style="display:flex;justify-content:space-around">'+
'<div><div style="font-size:24px;font-weight:800;color:#D85A30">'+totalOrders+'</div><div style="font-size:11px;color:#888">總訂單數</div></div>'+
'<div><div style="font-size:24px;font-weight:800;color:#D85A30">$'+totalSpent.toLocaleString()+'</div><div style="font-size:11px;color:#888">總消費金額</div></div>'+
'</div></div>';

orderData.orders.forEach(function(o){
var isPre=o.status==='preorder';
var badge=isPre?'<span class="order-badge badge-preorder">預約</span>':'<span class="order-badge badge-completed">完成</span>';
var dateStr=o.date||'';
if(dateStr.length===10){var parts=dateStr.split('-');dateStr=parts[1]+'/'+parts[2];}

html+='<div class="order-card'+(isPre?' preorder':'')+'">'+
'<div class="order-hd"><span class="order-id">'+o.orderId+badge+'</span><span class="order-date">'+dateStr+'</span></div>'+
'<div class="order-body"><div class="order-items">'+o.items.replace(/,\s*/g,'<br>')+'</div></div>'+
'<div class="order-ft"><span class="bowls">'+o.totalBowls+' 碗 | +'+o.pointsEarned+' 點</span><span class="amt">$'+o.totalAmount+'</span></div>'+
'</div>';
});

list.innerHTML=html;
}

function goOrder(){
var baseUrl=location.origin+location.pathname.replace(/member\.html$/,'').replace(/\/$/,'');
location.href=baseUrl+'/order.html';
}

init();
</script>
</body>
</html>
