════════════════════════════════════════════════════════ -->

<!-- ════════════════════════════════════════════════════════

<section id="tab-promos" class="tab-content" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2 style="margin:0;font-size:18px">🎯 活動管理</h2>

      <option value="">全部類型</option>

      <option value="redeem_promo">🎫 積分兌換連動</option>

    <select id="filter-promo-status" onchange="filterPromos()" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;font-size:13px">
      <option value="">全部狀態</option>
      <option value="active">🟢 進行中</option>
      <option value="scheduled">🔵 排程中</option>
      <option value="paused">🟡 已暫停</option>

    </select>

</section>

<!-- ════════════════════════════════════════════════════════
  位置 D：JavaScript — 在 </body> 前插入活動管理 JS
════════════════════════════════════════════════════════ -->
<script>
// ── 活動管理全域狀態 ──────────────────────────────────────
let _allPromos = [];
let _editingPromoId = null;

// ── 載入活動列表 ──────────────────────────────────────────
async function loadPromos() {
  const listEl = document.getElementById('promo-list');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:30px;color:#aaa">載入中...</div>';
  try {
    const at = liff.getAccessToken();
    const res = await fetch('/webhook/admin-api', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_promos', accessToken: at })
    });
    const data = await res.json();
    _allPromos = data.promos || [];
    renderPromoList(_allPromos);
  } catch(e) {
    listEl.innerHTML = '<div style="text-align:center;padding:30px;color:#e53935">載入失敗，請重試</div>';
  }
}

// ── 渲染活動列表 ──────────────────────────────────────────
function renderPromoList(promos) {
  const listEl = document.getElementById('promo-list');
  if (!listEl) return;
  if (!promos.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#bbb">尚無活動，點擊「＋ 新增活動」開始建立</div>';
    return;
  }
  const typeMap  = { group_boost:'🧑‍🤝‍🧑 揪團加碼', bonus_points:'⭐ 加贈積分', redeem_promo:'🎫 積分兌換' };
  const statusMap= { active:'<span style="background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:12px;font-size:11px">🟢 進行中</span>', scheduled:'<span style="background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:12px;font-size:11px">🔵 排程中</span>', paused:'<span style="background:#fffde7;color:#f57f17;padding:2px 8px;border-radius:12px;font-size:11px">🟡 暫停</span>', ended:'<span style="background:#f5f5f5;color:#616161;padding:2px 8px;border-radius:12px;font-size:11px">⚫ 已結束</span>' };
  const borderMap= { orange:'#ff9800', green:'#4caf50', red:'#e91e63', purple:'#9c27b0' };

  listEl.innerHTML = promos.map(p => {
    let summary = '';
    if (p.promo_type === 'group_boost')  summary = `揪 ${p.group_min_bowls||5} 碗享 ${Math.round((p.group_discount_rate||0.95)*100)} 折`;
    if (p.promo_type === 'bonus_points') {
      const pts = [];
      if ((p.points_multiplier||1)>1) pts.push(`全館 ${p.points_multiplier} 倍`);
      if (p.bonus_points_per_item>0)   pts.push(`品項 +${p.bonus_points_per_item}點`);
      if (p.spend_threshold>0)         pts.push(`滿$${p.spend_threshold}送${p.spend_bonus_points}點`);
      summary = pts.join(' ＋ ') || '—';
    }
    if (p.promo_type === 'redeem_promo') summary = `${p.redeem_points_required||50}點換${p.redeem_item_name||'豬腸麵線(小)'}`;
    const borderColor = borderMap[p.display_color||'orange'] || '#ff9800';
    const isPausable  = p.status === 'active' || p.status === 'scheduled' || p.status === 'paused';

    return `<div style="background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border-left:5px solid ${borderColor};box-shadow:0 1px 6px rgba(0,0,0,0.06)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:11px;background:#f0f0f0;border-radius:6px;padding:2px 8px">${typeMap[p.promo_type]||p.promo_type}</span>
          ${statusMap[p.status]||''}
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="editPromo('${p.page_id}')" style="background:none;border:none;font-size:16px;cursor:pointer" title="編輯">✏️</button>
          ${isPausable ? `<button onclick="togglePromoStatus('${p.page_id}','${p.status}')" style="background:none;border:none;font-size:16px;cursor:pointer" title="${p.status==='active'?'暫停':'啟動'}">${p.status==='active'?'⏸️':'▶️'}</button>` : ''}
        </div>
      </div>
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">${p.promo_name||'—'}</div>
      <div style="font-size:12px;color:#666;margin-bottom:6px">${summary}</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa">
        <span>📅 ${p.start_date||'?'} ～ ${p.end_date||'?'}</span>
        <span>${p.display_badge||''}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 篩選 ──────────────────────────────────────────────────
function filterPromos() {
  const type   = document.getElementById('filter-promo-type')?.value   || '';
  const status = document.getElementById('filter-promo-status')?.value || '';
  renderPromoList(_allPromos.filter(p =>
    (!type   || p.promo_type === type) &&
    (!status || p.status === status)
  ));
}

// ── 開啟 Modal ────────────────────────────────────────────
function openPromoModal(promoData = null) {
  _editingPromoId = promoData?.page_id || null;
  document.getElementById('promo-modal-title').textContent = promoData ? '編輯活動' : '新增活動';
  _resetPromoForm();
  if (promoData) _fillPromoForm(promoData);
  document.getElementById('promo-modal').style.display = 'flex';
}
function closePromoModal() {
  document.getElementById('promo-modal').style.display = 'none';
}
function _resetPromoForm() {
  ['pm-name','pm-badge','pm-notes','pm-target-items','pm-redeem-item'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  const pm = v => { const el=document.getElementById(v); if(el) return el; };
  if(pm('pm-type'))        pm('pm-type').value = '';
  if(pm('pm-status'))      pm('pm-status').value = 'active';
  if(pm('pm-priority'))    pm('pm-priority').value = 10;
  if(pm('pm-color'))       pm('pm-color').value = 'orange';
  if(pm('pm-min-bowls'))   pm('pm-min-bowls').value = 5;
  if(pm('pm-discount'))    pm('pm-discount').value = 0.95;
  if(pm('pm-multiplier'))  pm('pm-multiplier').value = 2;
  if(pm('pm-bonus-per-item')) pm('pm-bonus-per-item').value = 5;
  if(pm('pm-spend-threshold'))pm('pm-spend-threshold').value = 100;
  if(pm('pm-spend-bonus')) pm('pm-spend-bonus').value = 20;
  if(pm('pm-redeem-pts'))  pm('pm-redeem-pts').value = 30;
  ['pm-use-multi','pm-use-item','pm-use-spend'].forEach(id => { const el=document.getElementById(id); if(el) el.checked=false; });
  ['pm-multi-sec','pm-item-sec','pm-spend-sec','pm-section-group','pm-section-points','pm-section-redeem'].forEach(id => { const el=document.getElementById(id); if(el) el.style.display='none'; });
  updateGroupPreview();
}
function _fillPromoForm(p) {
  const set = (id, v) => { const el=document.getElementById(id); if(el&&v!==undefined) el.value=v; };
  set('pm-name', p.promo_name); set('pm-type', p.promo_type); set('pm-start', p.start_date);
  set('pm-end', p.end_date); set('pm-status', p.status); set('pm-priority', p.priority);
  set('pm-badge', p.display_badge); set('pm-color', p.display_color); set('pm-notes', p.notes);
  onPromoTypeChange();
  if (p.promo_type === 'group_boost') {
    set('pm-min-bowls', p.group_min_bowls); set('pm-discount', p.group_discount_rate); updateGroupPreview();
  }
  if (p.promo_type === 'bonus_points') {
    if ((p.points_multiplier||1)>1) { document.getElementById('pm-use-multi').checked=true; document.getElementById('pm-multi-sec').style.display='block'; set('pm-multiplier', p.points_multiplier); }
    if (p.bonus_points_per_item>0)  { document.getElementById('pm-use-item').checked=true; document.getElementById('pm-item-sec').style.display='block'; set('pm-target-items', p.target_items); set('pm-bonus-per-item', p.bonus_points_per_item); }
    if (p.spend_threshold>0)        { document.getElementById('pm-use-spend').checked=true; document.getElementById('pm-spend-sec').style.display='grid'; set('pm-spend-threshold', p.spend_threshold); set('pm-spend-bonus', p.spend_bonus_points); }
  }
  if (p.promo_type === 'redeem_promo') { set('pm-redeem-item', p.redeem_item_name); set('pm-redeem-pts', p.redeem_points_required); }
}

// ── 類型切換 ──────────────────────────────────────────────
function onPromoTypeChange() {
  const type = document.getElementById('pm-type')?.value;
  document.getElementById('pm-section-group').style.display  = type==='group_boost'  ? 'block' : 'none';
  document.getElementById('pm-section-points').style.display = type==='bonus_points' ? 'block' : 'none';
  document.getElementById('pm-section-redeem').style.display = type==='redeem_promo' ? 'block' : 'none';
}
function updateGroupPreview() {
  const bowls = document.getElementById('pm-min-bowls')?.value || 5;
  const rate  = document.getElementById('pm-discount')?.value  || 0.95;
  const el1 = document.getElementById('gp-bowls'), el2 = document.getElementById('gp-pct');
  if (el1) el1.textContent = bowls;
  if (el2) el2.textContent = Math.round(rate * 100);
}

// ── 儲存活動 ──────────────────────────────────────────────
async function savePromo() {
  const g = id => document.getElementById(id);
  const v = id => g(id)?.value?.trim() || '';
  const n = (id, def) => Number(g(id)?.value) || def;
  const c = id => g(id)?.checked || false;
  const payload = {
    action:    _editingPromoId ? 'update_promo' : 'create_promo',
    page_id:   _editingPromoId,
    accessToken: liff.getAccessToken(),
    promo_name: v('pm-name'), promo_type: v('pm-type'),
    start_date: v('pm-start'), end_date: v('pm-end'),
    status: v('pm-status'), priority: n('pm-priority', 10),
    display_badge: v('pm-badge'), display_color: v('pm-color'), notes: v('pm-notes'),
    group_min_bowls:      n('pm-min-bowls', 5),
    group_discount_rate:  n('pm-discount', 0.95),
    points_multiplier:    c('pm-use-multi') ? n('pm-multiplier', 2) : 1,
    target_items:         c('pm-use-item')  ? v('pm-target-items') : '',
    bonus_points_per_item:c('pm-use-item')  ? n('pm-bonus-per-item', 0) : 0,
    spend_threshold:      c('pm-use-spend') ? n('pm-spend-threshold', 0) : 0,
    spend_bonus_points:   c('pm-use-spend') ? n('pm-spend-bonus', 0) : 0,
    redeem_item_name:     v('pm-redeem-item'),
    redeem_points_required: n('pm-redeem-pts', 50),
  };
  if (!payload.promo_name || !payload.promo_type || !payload.start_date || !payload.end_date) {
    alert('請填寫活動名稱、類型及日期'); return;
  }
  try {
    const res = await fetch('/webhook/admin-api', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.success) {
      showToast && showToast(_editingPromoId ? '活動已更新 ✅' : '活動已建立 ✅');
      closePromoModal(); loadPromos();
    } else { alert('儲存失敗：' + (data.error||'未知錯誤')); }
  } catch(e) { alert('網路錯誤，請重試'); }
}

// ── 暫停 / 啟動 ───────────────────────────────────────────
async function togglePromoStatus(pageId, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'paused' : 'active';
  if (!confirm(`確定要${newStatus==='active'?'啟動':'暫停'}此活動？`)) return;
  try {
    await fetch('/webhook/admin-api', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'update_promo_status', page_id:pageId, status:newStatus, accessToken:liff.getAccessToken() }) });
    showToast && showToast(`活動已${newStatus==='active'?'啟動':'暫停'}`);
    loadPromos();
  } catch(e) { alert('操作失敗'); }
}

// ── 編輯 ──────────────────────────────────────────────────
function editPromo(pageId) {
  const p = _allPromos.find(x => x.page_id === pageId);
  if (p) openPromoModal(p);
}
