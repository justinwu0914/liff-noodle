<!-- ============================================================
  admin.html — 統一活動管理 Tab
  插入位置：admin.html 的 Tab 列表加入「活動」Tab，
  並在對應 section 貼上以下 HTML + JS
  ============================================================ -->

<!-- ── Tab 按鈕（加入現有 Tab 列） ───────────────────────── -->
<!-- 在原本 <div class="tabs"> 內新增： -->
<!-- <button class="tab-btn" onclick="switchTab('promos')">🎯 活動</button> -->

<!-- ── 活動管理 Section ──────────────────────────────────── -->
<section id="tab-promos" class="tab-content" style="display:none">
  <div class="section-header">
    <h2>🎯 統一活動管理</h2>
    <button class="btn btn-primary" onclick="openPromoModal()">＋ 新增活動</button>
  </div>

  <!-- 活動篩選列 -->
  <div class="filter-bar">
    <select id="promo-type-filter" onchange="filterPromos()">
      <option value="">全部類型</option>
      <option value="group_boost">🧑‍🤝‍🧑 揪團加碼</option>
      <option value="bonus_points">⭐ 加贈積分</option>
      <option value="redeem_promo">🎫 積分兌換連動</option>
    </select>
    <select id="promo-status-filter" onchange="filterPromos()">
      <option value="">全部狀態</option>
      <option value="active">🟢 進行中</option>
      <option value="scheduled">🔵 排程中</option>
      <option value="ended">⚫ 已結束</option>
      <option value="paused">🟡 已暫停</option>
    </select>
  </div>

  <!-- 活動列表 -->
  <div id="promo-list" class="promo-list">
    <div class="loading">載入活動中...</div>
  </div>
</section>

<!-- ── 新增/編輯活動 Modal ──────────────────────────────── -->
<div id="promo-modal" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closePromoModal()"></div>
  <div class="modal-content modal-content--wide">
    <div class="modal-header">
      <h3 id="promo-modal-title">新增活動</h3>
      <button class="modal-close" onclick="closePromoModal()">✕</button>
    </div>

    <div class="modal-body">
      <!-- 基本資訊 -->
      <fieldset class="form-group">
        <legend>基本資訊</legend>
        <label>活動名稱 <span class="required">*</span></label>
        <input type="text" id="f-promo-name" placeholder="例：週末揪團加碼、五月雙倍積分週" />

        <label>活動類型 <span class="required">*</span></label>
        <select id="f-promo-type" onchange="onPromoTypeChange()">
          <option value="">請選擇類型</option>
          <option value="group_boost">🧑‍🤝‍🧑 揪團加碼活動</option>
          <option value="bonus_points">⭐ 加贈積分活動</option>
          <option value="redeem_promo">🎫 積分兌換連動活動</option>
        </select>

        <div class="form-row">
          <div>
            <label>開始日期 <span class="required">*</span></label>
            <input type="date" id="f-start-date" />
          </div>
          <div>
            <label>結束日期 <span class="required">*</span></label>
            <input type="date" id="f-end-date" />
          </div>
        </div>

        <label>狀態</label>
        <select id="f-status">
          <option value="active">🟢 立即上架</option>
          <option value="scheduled">🔵 排程上架</option>
          <option value="paused">🟡 暫停</option>
        </select>

        <label>優先序（數字越小越優先）</label>
        <input type="number" id="f-priority" value="10" min="1" max="99" />
      </fieldset>

      <!-- 揪團加碼設定（動態顯示） -->
      <fieldset class="form-group" id="section-group-boost" style="display:none">
        <legend>🧑‍🤝‍🧑 揪團加碼設定</legend>
        <div class="form-row">
          <div>
            <label>最低揪團碗數 <span class="required">*</span></label>
            <input type="number" id="f-group-min-bowls" value="5" min="2" max="20" />
            <span class="hint">預設 5 碗，活動期間可降低門檻</span>
          </div>
          <div>
            <label>揪團折扣率 <span class="required">*</span></label>
            <input type="number" id="f-group-discount-rate" value="0.95" min="0.5" max="0.99" step="0.01" />
            <span class="hint">例：0.92 = 92折，預設 0.95</span>
          </div>
        </div>
        <div class="promo-preview" id="group-boost-preview">
          預覽：揪 <strong id="preview-min-bowls">5</strong> 碗起，享
          <strong id="preview-discount-pct">95</strong> 折
        </div>
      </fieldset>

      <!-- 加贈積分設定（動態顯示） -->
      <fieldset class="form-group" id="section-bonus-points" style="display:none">
        <legend>⭐ 加贈積分設定</legend>
        <p class="hint">以下三種加贈方式可同時啟用，結帳時全部累加計算。</p>

        <div class="bonus-option">
          <label class="checkbox-label">
            <input type="checkbox" id="f-use-multiplier" onchange="toggleBonusSection('multiplier')" />
            全館積分倍率
          </label>
          <div id="section-multiplier" style="display:none; margin-top:8px">
            <input type="number" id="f-points-multiplier" value="2" min="1.5" max="10" step="0.5" />
            <span class="hint">倍（例：2 = 雙倍積分）</span>
          </div>
        </div>

        <div class="bonus-option">
          <label class="checkbox-label">
            <input type="checkbox" id="f-use-item-bonus" onchange="toggleBonusSection('item')" />
            指定品項額外加贈積分
          </label>
          <div id="section-item-bonus" style="display:none; margin-top:8px">
            <label>指定品項（品項名稱，逗號分隔）</label>
            <input type="text" id="f-target-items" placeholder="例：鮮蚵麵線(小),鮮蚵麵線(大)" />
            <label>每份加贈積分</label>
            <input type="number" id="f-bonus-per-item" value="5" min="1" />
          </div>
        </div>

        <div class="bonus-option">
          <label class="checkbox-label">
            <input type="checkbox" id="f-use-spend-bonus" onchange="toggleBonusSection('spend')" />
            消費滿額送積分
          </label>
          <div id="section-spend-bonus" style="display:none; margin-top:8px">
            <div class="form-row">
              <div>
                <label>滿額門檻（元）</label>
                <input type="number" id="f-spend-threshold" value="100" min="1" />
              </div>
              <div>
                <label>贈送積分（點）</label>
                <input type="number" id="f-spend-bonus-points" value="20" min="1" />
              </div>
            </div>
          </div>
        </div>
      </fieldset>

      <!-- 積分兌換連動設定（動態顯示） -->
      <fieldset class="form-group" id="section-redeem-promo" style="display:none">
        <legend>🎫 積分兌換連動設定</legend>
        <p class="hint">活動期間將覆蓋系統預設的兌換品項與所需積分（預設：50點 = 豬腸麵線(小)）</p>
        <div class="form-row">
          <div>
            <label>活動兌換品項</label>
            <input type="text" id="f-redeem-item" placeholder="例：豬腸麵線(大)" />
          </div>
          <div>
            <label>所需積分（點）</label>
            <input type="number" id="f-redeem-points" value="30" min="1" />
          </div>
        </div>
        <div class="promo-preview">
          活動期間 → <strong id="preview-redeem-pts">30</strong> 點兌換
          <strong id="preview-redeem-item">豬腸麵線(大)</strong>
        </div>
      </fieldset>

      <!-- 前端顯示設定 -->
      <fieldset class="form-group">
        <legend>前端顯示設定</legend>
        <div class="form-row">
          <div>
            <label>活動標籤文字</label>
            <input type="text" id="f-display-badge" placeholder="例：🔥 限時優惠 / ⭐ 雙倍積分" />
          </div>
          <div>
            <label>標籤顏色</label>
            <select id="f-display-color">
              <option value="orange">🟠 橘色（揪團）</option>
              <option value="green">🟢 綠色（積分）</option>
              <option value="red">🔴 紅色（限時）</option>
              <option value="purple">🟣 紫色（兌換）</option>
            </select>
          </div>
        </div>
        <label>備註</label>
        <input type="text" id="f-notes" placeholder="內部備忘" />
      </fieldset>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePromoModal()">取消</button>
      <button class="btn btn-primary" onclick="savePromo()">💾 儲存活動</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 活動管理 JavaScript
// ============================================================

let allPromos = [];
let editingPromoId = null;

// ── 載入活動列表 ──────────────────────────────────────────
async function loadPromos() {
  try {
    const res = await fetch('/webhook/admin-api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_promos' })
    });
    const data = await res.json();
    allPromos = data.promos || [];
    renderPromoList(allPromos);
  } catch (e) {
    document.getElementById('promo-list').innerHTML =
      '<div class="error">載入失敗，請重試</div>';
  }
}

// ── 渲染活動列表 ──────────────────────────────────────────
function renderPromoList(promos) {
  const container = document.getElementById('promo-list');
  if (promos.length === 0) {
    container.innerHTML = '<div class="empty-state">尚無活動，點擊「新增活動」開始建立</div>';
    return;
  }

  const typeLabel = {
    group_boost:  '🧑‍🤝‍🧑 揪團加碼',
    bonus_points: '⭐ 加贈積分',
    redeem_promo: '🎫 積分兌換連動'
  };
  const statusLabel = {
    active:    '<span class="badge badge--green">🟢 進行中</span>',
    scheduled: '<span class="badge badge--blue">🔵 排程中</span>',
    ended:     '<span class="badge badge--gray">⚫ 已結束</span>',
    paused:    '<span class="badge badge--yellow">🟡 已暫停</span>'
  };

  container.innerHTML = promos.map(p => {
    // 組合活動摘要文字
    let summary = '';
    if (p.promo_type === 'group_boost') {
      summary = `揪 ${p.group_min_bowls || 5} 碗以上享 ${Math.round((p.group_discount_rate || 0.95) * 100)} 折`;
    } else if (p.promo_type === 'bonus_points') {
      const parts = [];
      if (p.points_multiplier > 1)     parts.push(`全館 ${p.points_multiplier} 倍積分`);
      if (p.bonus_points_per_item > 0)  parts.push(`指定品項 +${p.bonus_points_per_item} 點`);
      if (p.spend_threshold > 0)        parts.push(`滿 $${p.spend_threshold} 送 ${p.spend_bonus_points} 點`);
      summary = parts.join(' ＋ ') || '—';
    } else if (p.promo_type === 'redeem_promo') {
      summary = `${p.redeem_points_required || 50} 點兌換 ${p.redeem_item_name || '豬腸麵線(小)'}`;
    }

    return `
      <div class="promo-card promo-card--${p.display_color || 'orange'}">
        <div class="promo-card__header">
          <div>
            <span class="promo-type-badge">${typeLabel[p.promo_type] || p.promo_type}</span>
            ${statusLabel[p.status] || ''}
          </div>
          <div class="promo-card__actions">
            <button class="btn-icon" onclick="editPromo('${p.page_id}')" title="編輯">✏️</button>
            <button class="btn-icon" onclick="togglePromoStatus('${p.page_id}', '${p.status}')" title="暫停/啟動">
              ${p.status === 'active' ? '⏸️' : '▶️'}
            </button>
          </div>
        </div>
        <div class="promo-card__name">${p.promo_name || '—'}</div>
        <div class="promo-card__summary">${summary}</div>
        <div class="promo-card__footer">
          <span>📅 ${p.start_date || '?'} ～ ${p.end_date || '?'}</span>
          <span class="promo-badge-preview">${p.display_badge || ''}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ── 篩選活動 ──────────────────────────────────────────────
function filterPromos() {
  const type   = document.getElementById('promo-type-filter').value;
  const status = document.getElementById('promo-status-filter').value;
  const filtered = allPromos.filter(p =>
    (!type   || p.promo_type === type) &&
    (!status || p.status === status)
  );
  renderPromoList(filtered);
}

// ── 開啟新增 Modal ──────────────────────────────────────────
function openPromoModal(promoData = null) {
  editingPromoId = promoData?.page_id || null;
  document.getElementById('promo-modal-title').textContent =
    promoData ? '編輯活動' : '新增活動';

  // 清空表單
  resetPromoForm();

  // 若是編輯則填入資料
  if (promoData) {
    document.getElementById('f-promo-name').value       = promoData.promo_name || '';
    document.getElementById('f-promo-type').value       = promoData.promo_type || '';
    document.getElementById('f-start-date').value       = promoData.start_date || '';
    document.getElementById('f-end-date').value         = promoData.end_date || '';
    document.getElementById('f-status').value           = promoData.status || 'active';
    document.getElementById('f-priority').value         = promoData.priority || 10;
    document.getElementById('f-display-badge').value    = promoData.display_badge || '';
    document.getElementById('f-display-color').value    = promoData.display_color || 'orange';
    document.getElementById('f-notes').value            = promoData.notes || '';
    onPromoTypeChange();
    // 依類型填入特定欄位...
    if (promoData.promo_type === 'group_boost') {
      document.getElementById('f-group-min-bowls').value   = promoData.group_min_bowls || 5;
      document.getElementById('f-group-discount-rate').value = promoData.group_discount_rate || 0.95;
      updateGroupBoostPreview();
    }
    if (promoData.promo_type === 'redeem_promo') {
      document.getElementById('f-redeem-item').value   = promoData.redeem_item_name || '';
      document.getElementById('f-redeem-points').value = promoData.redeem_points_required || 50;
    }
  }

  document.getElementById('promo-modal').style.display = 'flex';
}

function closePromoModal() {
  document.getElementById('promo-modal').style.display = 'none';
}

function resetPromoForm() {
  ['f-promo-name','f-promo-type','f-start-date','f-end-date','f-display-badge','f-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-status').value = 'active';
  document.getElementById('f-priority').value = 10;
  document.getElementById('f-display-color').value = 'orange';
  document.getElementById('f-group-min-bowls').value = 5;
  document.getElementById('f-group-discount-rate').value = 0.95;
  document.getElementById('f-redeem-points').value = 50;
  ['section-group-boost','section-bonus-points','section-redeem-promo'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

// ── 依類型切換欄位顯示 ──────────────────────────────────────
function onPromoTypeChange() {
  const type = document.getElementById('f-promo-type').value;
  document.getElementById('section-group-boost').style.display  = type === 'group_boost'  ? '' : 'none';
  document.getElementById('section-bonus-points').style.display = type === 'bonus_points' ? '' : 'none';
  document.getElementById('section-redeem-promo').style.display = type === 'redeem_promo' ? '' : 'none';
}

function toggleBonusSection(key) {
  const map = { multiplier: 'section-multiplier', item: 'section-item-bonus', spend: 'section-spend-bonus' };
  const checked = document.getElementById(`f-use-${key}`).checked;
  document.getElementById(map[key]).style.display = checked ? '' : 'none';
}

// ── 揪團加碼即時預覽 ──────────────────────────────────────
function updateGroupBoostPreview() {
  const bowls = document.getElementById('f-group-min-bowls').value;
  const rate  = document.getElementById('f-group-discount-rate').value;
  document.getElementById('preview-min-bowls').textContent = bowls;
  document.getElementById('preview-discount-pct').textContent = Math.round(rate * 100);
}
// 加入事件監聽
['f-group-min-bowls','f-group-discount-rate'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', updateGroupBoostPreview);
});

// ── 儲存活動 ──────────────────────────────────────────────
async function savePromo() {
  const payload = {
    action: editingPromoId ? 'update_promo' : 'create_promo',
    page_id:      editingPromoId,
    promo_name:   document.getElementById('f-promo-name').value.trim(),
    promo_type:   document.getElementById('f-promo-type').value,
    start_date:   document.getElementById('f-start-date').value,
    end_date:     document.getElementById('f-end-date').value,
    status:       document.getElementById('f-status').value,
    priority:     Number(document.getElementById('f-priority').value),
    display_badge: document.getElementById('f-display-badge').value.trim(),
    display_color: document.getElementById('f-display-color').value,
    notes:        document.getElementById('f-notes').value.trim(),
    // 類型特定欄位
    group_min_bowls:     Number(document.getElementById('f-group-min-bowls').value),
    group_discount_rate: Number(document.getElementById('f-group-discount-rate').value),
    points_multiplier:   document.getElementById('f-use-multiplier').checked
                          ? Number(document.getElementById('f-points-multiplier').value) : 1,
    target_items:        document.getElementById('f-use-item-bonus').checked
                          ? document.getElementById('f-target-items').value.trim() : '',
    bonus_points_per_item: document.getElementById('f-use-item-bonus').checked
                          ? Number(document.getElementById('f-bonus-per-item').value) : 0,
    spend_threshold:     document.getElementById('f-use-spend-bonus').checked
                          ? Number(document.getElementById('f-spend-threshold').value) : 0,
    spend_bonus_points:  document.getElementById('f-use-spend-bonus').checked
                          ? Number(document.getElementById('f-spend-bonus-points').value) : 0,
    redeem_item_name:    document.getElementById('f-redeem-item').value.trim(),
    redeem_points_required: Number(document.getElementById('f-redeem-points').value),
  };

  if (!payload.promo_name || !payload.promo_type || !payload.start_date || !payload.end_date) {
    alert('請填寫活動名稱、類型及日期');
    return;
  }

  try {
    const res = await fetch('/webhook/admin-api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      showToast(editingPromoId ? '活動已更新 ✅' : '活動已建立 ✅');
      closePromoModal();
      loadPromos();
    } else {
      alert('儲存失敗：' + (data.error || '未知錯誤'));
    }
  } catch (e) {
    alert('網路錯誤，請重試');
  }
}

// ── 暫停/啟動活動 ─────────────────────────────────────────
async function togglePromoStatus(pageId, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'paused' : 'active';
  const label = newStatus === 'active' ? '啟動' : '暫停';
  if (!confirm(`確定要${label}此活動？`)) return;

  await fetch('/webhook/admin-api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'update_promo_status', page_id: pageId, status: newStatus })
  });
  showToast(`活動已${label}`);
  loadPromos();
}

// ── 編輯活動 ──────────────────────────────────────────────
function editPromo(pageId) {
  const promo = allPromos.find(p => p.page_id === pageId);
  if (promo) openPromoModal(promo);
}

// ── Tab 切換時觸發載入 ────────────────────────────────────
// 在原本 switchTab() 函式加入：
// if (tabName === 'promos') loadPromos();
</script>

<style>
/* ── 活動管理 CSS ── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
.filter-bar select { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }

.promo-list { display: grid; gap: 12px; }
.promo-card { background: #fff; border-radius: 12px; padding: 14px; border-left: 5px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.promo-card--orange { border-left-color: #ff9800; }
.promo-card--green  { border-left-color: #4caf50; }
.promo-card--red    { border-left-color: #e91e63; }
.promo-card--purple { border-left-color: #9c27b0; }
.promo-card__header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.promo-card__name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.promo-card__summary { font-size: 13px; color: #555; margin-bottom: 8px; }
.promo-card__footer { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
.promo-card__actions { display: flex; gap: 6px; }
.btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; padding: 2px; }
.promo-type-badge { font-size: 12px; background: #f0f0f0; border-radius: 6px; padding: 2px 8px; margin-right: 6px; }
.badge { font-size: 12px; padding: 2px 8px; border-radius: 20px; }
.badge--green  { background: #e8f5e9; color: #2e7d32; }
.badge--blue   { background: #e3f2fd; color: #1565c0; }
.badge--gray   { background: #f5f5f5; color: #616161; }
.badge--yellow { background: #fffde7; color: #f57f17; }

/* Modal */
.modal { position: fixed; inset: 0; display: flex; align-items: flex-end; z-index: 1000; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
