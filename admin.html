<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>商家後台 — 老全麵線</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;padding-bottom:60px}
.hd{background:linear-gradient(135deg,#16213e,#0f3460);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.hd h1{font-size:16px;font-weight:700;color:#e94560}
.hd .badge{font-size:10px;background:#e94560;color:#fff;padding:2px 8px;border-radius:10px}
.tabs{display:flex;background:#16213e;position:sticky;top:48px;z-index:99;border-bottom:1px solid #0f3460}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:#e94560;border-bottom-color:#e94560}
.panel{display:none;padding:12px 14px}
.panel.on{display:block}
.card{background:#16213e;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #0f3460}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:#0f3460;border-radius:10px;padding:14px;text-align:center}
.stat-card .val{font-size:24px;font-weight:800;color:#e94560}
.stat-card .lbl{font-size:11px;color:#888;margin-top:4px}
.order-card{background:#16213e;border-radius:10px;margin-bottom:8px;border-left:3px solid #e94560;overflow:hidden;border:1px solid #0f3460}
.order-card.preorder{border-left-color:#f0997b}
.order-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #0f3460}
.order-id{font-family:monospace;font-size:11px;color:#e94560;font-weight:600}
.order-time{font-size:11px;color:#666}
.order-body{padding:8px 12px;font-size:12px;color:#aaa;line-height:1.5}
.order-ft{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#0a0a1a}
.order-ft .bowls{font-size:11px;color:#666}
.order-ft .amt{font-size:15px;font-weight:800;color:#e94560}
.badge-s{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px;margin-left:6px}
.badge-ok{background:#1d3d2e;color:#5dcaa5}
.badge-pre{background:#3d2e1d;color:#f0997b}
.member-card{background:#16213e;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #0f3460}
.member-info .name{font-size:14px;font-weight:700;color:#eee}
.member-info .detail{font-size:11px;color:#888;margin-top:2px}
.member-right{text-align:right}
.member-right .pts{font-size:18px;font-weight:800;color:#e94560}
.member-right .lvl{font-size:10px;color:#888}
.search-box{width:100%;padding:10px 14px;background:#0f3460;border:1px solid #1a1a4e;border-radius:10px;color:#eee;font-size:14px;margin-bottom:12px;outline:none}
.search-box:focus{border-color:#e94560}
.search-box::placeholder{color:#555}
.btn-complete{padding:6px 12px;background:#e94560;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}
.btn-complete:active{opacity:.7}
.btn-complete:disabled{background:#333;color:#666}
.period-tabs{display:flex;gap:6px;margin-bottom:12px}
.period-tab{flex:1;padding:8px;text-align:center;background:#0f3460;border-radius:8px;font-size:12px;font-weight:600;color:#888;cursor:pointer;border:1px solid transparent}
.period-tab.on{color:#e94560;border-color:#e94560}
.loading{text-align:center;padding:40px;color:#666}
.loading .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#e94560;margin:0 3px;animation:pulse .6s infinite alternate}
.loading .dot:nth-child(2){animation-delay:.2s}
.loading .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.empty{text-align:center;padding:40px;color:#555;font-size:13px}
.denied{text-align:center;padding:80px 20px;color:#e94560}
.denied .ic{font-size:48px;margin-bottom:12px}
.denied h2{font-size:18px;margin-bottom:8px}
.denied p{font-size:13px;color:#666}
.refresh-btn{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:#e94560;color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(233,69,96,.4);z-index:100}
.refresh-btn:active{transform:scale(.9)}
</style>
</head>
<body>
<div class="hd">
  <h1>商家後台</h1>
  <span class="badge">老全麵線</span>
</div>
<div class="tabs">
  <div class="tab on" onclick="switchTab(0)">訂單</div>
  <div class="tab" onclick="switchTab(1)">營收</div>
  <div class="tab" onclick="switchTab(2)">會員</div>
  <div class="tab" onclick="switchTab(3)">預約</div>
  <div class="tab" onclick="switchTab(4)">推播</div>
  <div class="tab" onclick="switchTab(5)">設定</div>
</div>
<div id="app">
  <div class="loading" style="padding:80px 20px">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div style="margin-top:12px;font-size:12px;color:#555">驗證管理員身份...</div>
  </div>
</div>
<button class="refresh-btn" id="refreshBtn" style="display:none" onclick="refreshCurrent()">↻</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var LIFF_ID='2009530264-jdJXYpnX';
var ADMIN_URL='https://n8n.justinaiauto.com/webhook/admin-api';
var accessToken='';
var currentTab=0;
var cachedData={};

async function init(){
try{
  accessToken=sessionStorage.getItem('liff_token')||'';
  if(!accessToken){
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return;}
    accessToken=liff.getAccessToken()||'';
    try{sessionStorage.setItem('liff_token',accessToken);}catch(e){}
  }
  // Test admin access
  var resp=await callAPI('all_orders');
  if(!resp.success){
    if(resp.error==='NOT_ADMIN'){
      document.getElementById('app').innerHTML='<div class="denied"><div class="ic">🔒</div><h2>無管理員權限</h2><p>此頁面僅限店家管理員使用</p></div>';
      return;
    }
    throw new Error(resp.error||'Auth failed');
  }
  cachedData.orders=resp;
  renderApp();
  document.getElementById('refreshBtn').style.display='block';
}catch(e){
  document.getElementById('app').innerHTML='<div class="denied"><div class="ic">⚠️</div><h2>載入失敗</h2><p>'+e.message+'</p></div>';
}
}

async function callAPI(action,extra){
  var body=Object.assign({accessToken:accessToken,action:action,_t:Date.now()},extra||{});
  var resp=await fetch(ADMIN_URL,{method:'POST',headers:{'Content-Type':'application/json','Cache-Control':'no-cache'},body:JSON.stringify(body)});
  return await resp.json();
}

function renderApp(){
  document.getElementById('app').innerHTML=
    '<div class="panel on" id="p0"></div>'+
    '<div class="panel" id="p1"></div>'+
    '<div class="panel" id="p2"></div>'+
    '<div class="panel" id="p3"></div>'+
    '<div class="panel" id="p4"></div>'+
    '<div class="panel" id="p5"></div>';
  renderOrders();
}

function switchTab(n){
  currentTab=n;
  var tabs=document.querySelectorAll('.tab');
  var panels=document.querySelectorAll('.panel');
  tabs.forEach(function(t,i){t.className=i===n?'tab on':'tab';});
  panels.forEach(function(p,i){p.className=i===n?'panel on':'panel';});
  if(n===0)renderOrders();
  if(n===1)loadRevenue();
  if(n===2)renderMembers();
  if(n===3)loadPreorders();
  if(n===4)renderBroadcast();
  if(n===5)loadSettings();
}

function refreshCurrent(){cachedData={};switchTab(currentTab);}

// === Tab 0: All Orders (grouped by date) ===
function renderOrders(){
  var d=cachedData.orders;
  if(!d||!d.success){document.getElementById('p0').innerHTML='<div class="loading"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';loadOrders();return;}
  var h='<div class="stats-grid">'+
    '<div class="stat-card"><div class="val">'+d.count+'</div><div class="lbl">總訂單數</div></div>'+
    '<div class="stat-card"><div class="val">$'+(d.totalAmount||0).toLocaleString()+'</div><div class="lbl">總營收</div></div>'+
    '<div class="stat-card"><div class="val">'+(d.totalBowls||0)+'</div><div class="lbl">總碗數</div></div>'+
    '<div class="stat-card"><div class="val">$'+(d.count>0?Math.round(d.totalAmount/d.count):0)+'</div><div class="lbl">平均客單價</div></div>'+
    '</div>';
  if(!d.orders||d.orders.length===0){h+='<div class="empty">尚無任何訂單</div>';}
  else{
    var grouped={};
    d.orders.forEach(function(o){
      var dt=o.date||'未知日期';
      if(!grouped[dt])grouped[dt]=[];
      grouped[dt].push(o);
    });
    var dates=Object.keys(grouped).sort().reverse();
    var today=new Date().toISOString().split('T')[0];
    dates.forEach(function(dt){
      var dayOrders=grouped[dt];
      var dayAmt=dayOrders.reduce(function(s,o){return s+o.totalAmount;},0);
      var dayBowls=dayOrders.reduce(function(s,o){return s+o.totalBowls;},0);
      var isToday=dt===today;
      h+='<div style="margin:16px 0 8px;padding:8px 12px;background:'+(isToday?'#2d1525':'#0a0a1a')+';border-radius:8px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid '+(isToday?'#e94560':'#333')+'">'+
        '<div><span style="font-size:14px;font-weight:700;color:'+(isToday?'#e94560':'#ccc')+'">'+dt+(isToday?' (今日)':'')+'</span>'+
        '<span style="font-size:11px;color:#666;margin-left:8px">'+dayOrders.length+' 筆</span></div>'+
        '<div style="text-align:right"><span style="font-size:14px;font-weight:700;color:#e94560">$'+dayAmt.toLocaleString()+'</span>'+
        '<span style="font-size:11px;color:#666;margin-left:6px">'+dayBowls+' 碗</span></div></div>';
      dayOrders.forEach(function(o){
        var isPre=o.status==='preorder';
        var statusMap={'new':'🆕 新訂單','preparing':'🍳 製作中','ready':'✅ 完成取餐','picked_up':'📦 已取餐','completed':'✔ 完成','preorder':'📝 預約','cancelled':'❌ 取消'};
        var statusColor={'new':'#378ADD','preparing':'#EF9F27','ready':'#1D9E75','picked_up':'#888780','completed':'#1D9E75','preorder':'#D85A30','cancelled':'#E24B4A'};
        var nextMap={'new':'preparing','preparing':'ready','ready':'picked_up'};
        var nextLabel={'new':'開始製作','preparing':'製作完成','ready':'已取餐'};
        var st=o.status||'completed';
        var badge='<span class="badge-s" style="background:'+statusColor[st]+'22;color:'+statusColor[st]+'">'+(statusMap[st]||st)+'</span>';
        var actionBtn='';
        if(nextMap[st]){
          actionBtn='<button class="btn-complete" onclick="updateStatus(this,\''+o.pageId+'\',\''+nextMap[st]+'\',\''+o.userId+'\',\''+o.orderId+'\')">'+(nextLabel[st]||'下一步')+'</button>';
        }
        h+='<div class="order-card'+(isPre?' preorder':'')+'" style="border-left-color:'+statusColor[st]+'">'+
        '<div class="order-hd"><span class="order-id">'+o.orderId+badge+'</span><span class="order-time">'+o.customerName+'</span></div>'+
        '<div class="order-body">'+o.items.replace(/,\s*/g,' | ')+'</div>'+
        '<div class="order-ft"><span class="bowls">'+o.totalBowls+' 碗 | +'+o.pointsEarned+'點</span>'+actionBtn+'<span class="amt">$'+o.totalAmount+'</span></div>'+
        '</div>';
      });
    });
  }
  document.getElementById('p0').innerHTML=h;
}
async function loadOrders(){
  try{cachedData.orders=await callAPI('all_orders');renderOrders();}catch(e){document.getElementById('p0').innerHTML='<div class="empty">載入失敗</div>';}
}

// === Tab 1: Revenue ===
async function loadRevenue(){
  document.getElementById('p1').innerHTML='<div class="loading"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  try{
    var d=await callAPI('revenue_stats');
    if(!d.success)throw new Error(d.error);
    var h='<div class="period-tabs">'+
      '<div class="period-tab on" id="pt-today">今日</div>'+
      '<div class="period-tab" id="pt-week">本週</div>'+
      '<div class="period-tab" id="pt-month">本月</div>'+
      '</div><div id="rev-content"></div>';
    document.getElementById('p1').innerHTML=h;
    var periods={today:d.today,week:d.week,month:d.month};
    var curPeriod='today';
    function showPeriod(p){
      curPeriod=p;
      document.querySelectorAll('.period-tab').forEach(function(t){t.className='period-tab'+(t.id==='pt-'+p?' on':'');});
      var s=periods[p];
      document.getElementById('rev-content').innerHTML=
        '<div class="stats-grid">'+
        '<div class="stat-card"><div class="val">$'+(s.amount||0).toLocaleString()+'</div><div class="lbl">營收總額</div></div>'+
        '<div class="stat-card"><div class="val">'+(s.orders||0)+'</div><div class="lbl">訂單數</div></div>'+
        '<div class="stat-card"><div class="val">'+(s.bowls||0)+'</div><div class="lbl">總碗數</div></div>'+
        '<div class="stat-card"><div class="val">$'+(s.avg||0)+'</div><div class="lbl">平均客單價</div></div>'+
        '</div>';
    }
    showPeriod('today');
    document.getElementById('pt-today').onclick=function(){showPeriod('today');};
    document.getElementById('pt-week').onclick=function(){showPeriod('week');};
    document.getElementById('pt-month').onclick=function(){showPeriod('month');};
  }catch(e){document.getElementById('p1').innerHTML='<div class="empty">載入失敗</div>';}
}

// === Tab 2: Members ===
var memberSearchTimer=null;
function renderMembers(){
  document.getElementById('p2').innerHTML='<input class="search-box" id="memberSearch" placeholder="搜尋會員姓名..." oninput="onMemberSearch()"><div id="member-list"><div class="loading"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div></div>';
  loadMembers('');
}
function onMemberSearch(){
  clearTimeout(memberSearchTimer);
  memberSearchTimer=setTimeout(function(){
    var q=document.getElementById('memberSearch').value;
    loadMembers(q);
  },400);
}
async function loadMembers(search){
  try{
    var d=await callAPI('members',{search:search});
    if(!d.success)throw new Error(d.error);
    var el=document.getElementById('member-list');
    if(!d.members||d.members.length===0){el.innerHTML='<div class="empty">無符合的會員</div>';return;}
    var h='<div style="font-size:11px;color:#555;margin-bottom:8px;text-align:right">共 '+d.count+' 位會員</div>';
    d.members.forEach(function(m){
      h+='<div class="member-card">'+
      '<div class="member-info"><div class="name">'+m.name+'</div><div class="detail">'+m.phone+' | '+m.birthday+' | 來店'+m.visits+'次</div></div>'+
      '<div class="member-right"><div class="pts">'+m.points+'</div><div class="lvl">'+m.level+'</div></div>'+
      '</div>';
    });
    el.innerHTML=h;
  }catch(e){document.getElementById('member-list').innerHTML='<div class="empty">載入失敗</div>';}
}

// === Tab 3: Preorders ===
async function loadPreorders(){
  document.getElementById('p3').innerHTML='<div class="loading"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  try{
    var d=await callAPI('preorders');
    if(!d.success)throw new Error(d.error);
    if(!d.preorders||d.preorders.length===0){document.getElementById('p3').innerHTML='<div class="empty">目前沒有待處理的預約訂單 ✅</div>';return;}
    var h='<div style="font-size:11px;color:#555;margin-bottom:8px">共 '+d.count+' 筆待處理</div>';
    d.preorders.forEach(function(o){
      h+='<div class="order-card preorder">'+
      '<div class="order-hd"><span class="order-id">'+o.orderId+'<span class="badge-s badge-pre">預約</span></span><span class="order-time">'+o.date+'</span></div>'+
      '<div class="order-body"><b>'+o.customerName+'</b> — '+o.items+'</div>'+
      '<div class="order-ft"><span class="bowls">'+o.totalBowls+' 碗 $'+o.totalAmount+'</span><button class="btn-complete" onclick="completePreorder(this,\''+o.pageId+'\')">標記完成</button></div>'+
      '</div>';
    });
    document.getElementById('p3').innerHTML=h;
  }catch(e){document.getElementById('p3').innerHTML='<div class="empty">載入失敗</div>';}
}
async function completePreorder(btn,pageId){
  btn.disabled=true;btn.textContent='處理中...';
  try{
    var d=await callAPI('complete_preorder',{pageId:pageId});
    if(d.success){btn.textContent='已完成 ✅';btn.style.background='#1d3d2e';
    setTimeout(function(){loadPreorders();},1000);}
    else{btn.textContent='失敗';btn.disabled=false;}
  }catch(e){btn.textContent='失敗';btn.disabled=false;}
}

async function updateStatus(btn,pageId,newStatus,customerUserId,orderId){
  btn.disabled=true;btn.textContent='處理中...';
  try{
    var d=await callAPI('update_order_status',{pageId:pageId,newStatus:newStatus,customerUserId:customerUserId,orderId:orderId});
    if(d.success){
      var labels={'preparing':'🍳 製作中','ready':'✅ 完成','picked_up':'📦 已取餐'};
      btn.textContent=(labels[newStatus]||'已更新');
      btn.style.background='#1d3d2e';
      setTimeout(function(){loadOrders();},800);
    }else{btn.textContent='失敗';btn.disabled=false;}
  }catch(e){btn.textContent='失敗';btn.disabled=false;}
}

// === Tab 4: Broadcast ===
function renderBroadcast(){
  document.getElementById('p4').innerHTML=
    '<div class="card" style="margin-bottom:10px">'+
    '<div style="font-size:14px;font-weight:700;color:#e94560;margin-bottom:12px">🔥 建立促銷活動（推播+點餐頁連動）</div>'+
    '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">打折品項（可多選）</div>'+
    '<div id="promo-items" style="display:flex;flex-wrap:wrap;gap:6px"></div></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
    '<div style="flex:1"><div style="font-size:11px;color:#888;margin-bottom:4px">折數（例如 75 = 75折）</div><input id="promo-discount" class="search-box" type="number" min="10" max="99" value="75" placeholder="75"></div>'+
    '<div style="flex:1"><div style="font-size:11px;color:#888;margin-bottom:4px">活動日期</div><input id="promo-date" class="search-box" type="date" value="'+new Date().toISOString().split('T')[0]+'"></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
    '<div style="flex:1"><div style="font-size:11px;color:#888;margin-bottom:4px">開始時間</div><input id="promo-start" class="search-box" type="time" value="06:30"></div>'+
    '<div style="flex:1"><div style="font-size:11px;color:#888;margin-bottom:4px">結束時間</div><input id="promo-end" class="search-box" type="time" value="13:00"></div>'+
    '</div>'+
    '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">推播訊息（自動產生，可修改）</div>'+
    '<textarea id="promo-msg" class="search-box" style="height:80px;resize:none"></textarea></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<span style="font-size:11px;color:#555" id="promo-status"></span>'+
    '<button class="btn-complete" style="padding:10px 20px;font-size:13px" onclick="launchPromo()">🔥 推播 + 啟用活動</button>'+
    '</div>'+
    '<div id="active-promo-area" style="margin-top:12px"></div>'+
    '</div>'+
    '<div class="card">'+
    '<div style="font-size:14px;font-weight:700;color:#e94560;margin-bottom:12px">📢 一般推播（純訊息，不連動折扣）</div>'+
    '<div style="margin-bottom:8px">'+
    '<div style="font-size:11px;color:#888;margin-bottom:4px">快速範本</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px">'+
    '<span class="badge-s" style="background:#e9456022;color:#e94560;padding:6px 10px;cursor:pointer;font-size:11px" onclick="setBroadcast(\'🍜 午餐時段加碼！\\n\\n今天 11:00-12:00 點餐\\n揪團不限碗數直接享 95 折\\n\\n快來揪團 👥\')">揪團加碼</span>'+
    '<span class="badge-s" style="background:#e9456022;color:#e94560;padding:6px 10px;cursor:pointer;font-size:11px" onclick="setBroadcast(\'🎉 好消息！\\n\\n本週消費滿 $100 加贈 20 點\\n累積點數換免費麵線 🍜\\n\\n老全麵線感恩回饋\')">加贈積分</span>'+
    '</div></div>'+
    '<textarea id="broadcast-msg" placeholder="輸入要推播的訊息內容..." style="width:100%;height:80px;padding:10px;background:#0f3460;border:1px solid #1a1a4e;border-radius:10px;color:#eee;font-size:14px;resize:none;outline:none;font-family:inherit"></textarea>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">'+
    '<span style="font-size:11px;color:#555" id="broadcast-status"></span>'+
    '<button class="btn-complete" style="padding:10px 24px;font-size:13px" onclick="doBroadcast()">📢 發送推播</button>'+
    '</div></div>';
  // Render item checkboxes
  var menuItems=['鮮蚵麵線','綜合麵線','豬腸麵線','清麵線'];
  var itemsHtml=menuItems.map(function(nm){return '<label style="display:flex;align-items:center;gap:4px;padding:6px 10px;background:#0f3460;border-radius:8px;cursor:pointer;font-size:12px;color:#ccc"><input type="checkbox" class="promo-item-cb" value="'+nm+'" onchange="updatePromoMsg()"> '+nm+'</label>';}).join('');
  document.getElementById('promo-items').innerHTML=itemsHtml;
  updatePromoMsg();
  loadActivePromo();
}
function getSelectedPromoItems(){
  var cbs=document.querySelectorAll('.promo-item-cb:checked');
  var items=[];cbs.forEach(function(cb){items.push(cb.value);});
  return items;
}
function updatePromoMsg(){
  var items=getSelectedPromoItems();
  var disc=document.getElementById('promo-discount')?.value||'75';
  var itemText=items.length?items.join('、'):'全品項';
  var msg='🔥 今日限定！'+itemText+' '+disc+' 折\n\n活動時間：今天營業時段\n到店點餐即享優惠\n\n老全麵線等你來 🍜';
  var el=document.getElementById('promo-msg');
  if(el)el.value=msg;
}
async function loadActivePromo(){
  try{
    var d=await callAPI('get_settings');
    if(!d.success)return;
    var raw=d.settings.active_promo||'';
    if(!raw){document.getElementById('active-promo-area').innerHTML='<div style="font-size:11px;color:#555;text-align:center;padding:8px">目前沒有進行中的促銷活動</div>';return;}
    var promo=JSON.parse(raw);
    if(!promo.enabled){document.getElementById('active-promo-area').innerHTML='<div style="font-size:11px;color:#555;text-align:center;padding:8px">目前沒有進行中的促銷活動</div>';return;}
    var itemText=promo.items&&promo.items.length?promo.items.join('、'):'全品項';
    document.getElementById('active-promo-area').innerHTML=
      '<div style="background:#2d1525;border:1px solid #e94560;border-radius:10px;padding:12px">'+
      '<div style="font-size:12px;font-weight:700;color:#e94560;margin-bottom:6px">🔴 進行中的促銷活動</div>'+
      '<div style="font-size:12px;color:#ccc">'+itemText+' '+promo.discount+' 折</div>'+
      '<div style="font-size:11px;color:#888;margin-top:4px">'+promo.date+' '+promo.startTime+' ~ '+promo.endTime+'</div>'+
      '<button class="btn-complete" style="margin-top:8px;background:#E24B4A;padding:6px 16px;font-size:11px" onclick="stopPromo()">⛔ 關閉活動</button>'+
      '</div>';
  }catch(e){}
}
async function launchPromo(){
  var items=getSelectedPromoItems();
  var disc=parseInt(document.getElementById('promo-discount').value)||75;
  var date=document.getElementById('promo-date').value;
  var startTime=document.getElementById('promo-start').value;
  var endTime=document.getElementById('promo-end').value;
  var msg=document.getElementById('promo-msg').value.trim();
  if(disc<10||disc>99){alert('折數請輸入 10~99');return;}
  if(!msg){alert('請輸入推播訊息');return;}
  if(!confirm('確定要啟用促銷活動並推播給所有會員嗎？\n\n'+msg)){return;}
  var st=document.getElementById('promo-status');
  st.textContent='啟用中...';st.style.color='#EF9F27';
  var promo={enabled:true,discount:disc,items:items,startTime:startTime,endTime:endTime,date:date,message:msg};
  try{
    await callAPI('update_setting',{key:'active_promo',value:JSON.stringify(promo)});
    var d=await callAPI('broadcast',{message:msg});
    if(d.success){st.textContent='✅ 活動已啟用！推播送達 '+d.pushed+' 人';st.style.color='#1D9E75';loadActivePromo();}
    else{st.textContent='活動已啟用，但推播失敗';st.style.color='#EF9F27';}
  }catch(e){st.textContent='❌ 啟用失敗';st.style.color='#E24B4A';}
}
async function stopPromo(){
  if(!confirm('確定要關閉促銷活動嗎？'))return;
  try{
    await callAPI('update_setting',{key:'active_promo',value:JSON.stringify({enabled:false})});
    loadActivePromo();
  }catch(e){alert('關閉失敗');}
}
function setBroadcast(txt){document.getElementById('broadcast-msg').value=txt;}
async function doBroadcast(){
  var msg=document.getElementById('broadcast-msg').value.trim();
  if(!msg){alert('請輸入推播內容');return;}
  if(!confirm('確定要推播給所有會員嗎？')){return;}
  var st=document.getElementById('broadcast-status');
  st.textContent='推播中...';st.style.color='#EF9F27';
  try{
    var d=await callAPI('broadcast',{message:msg});
    if(d.success){st.textContent='✅ 推播成功！送達 '+d.pushed+' 人'+(d.failed?' / 失敗 '+d.failed+' 人':'');st.style.color='#1D9E75';document.getElementById('broadcast-msg').value='';}
    else{st.textContent='❌ '+d.error;st.style.color='#E24B4A';}
  }catch(e){st.textContent='❌ 推播失敗';st.style.color='#E24B4A';}
}

// === Tab 5: Settings ===
async function loadSettings(){
  document.getElementById('p5').innerHTML='<div class="loading"><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  try{
    var d=await callAPI('get_settings');
    if(!d.success)throw new Error(d.error);
    var s=d.settings;
    document.getElementById('p5').innerHTML=
      '<div class="card">'+
      '<div style="font-size:14px;font-weight:700;color:#e94560;margin-bottom:12px">⚙️ 店家設定</div>'+
      '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">店名</div><input id="s-shop_name" class="search-box" value="'+(s.shop_name||'').replace(/"/g,'&quot;')+'"></div>'+
      '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">電話</div><input id="s-phone" class="search-box" value="'+(s.phone||'').replace(/"/g,'&quot;')+'"></div>'+
      '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">地址</div><input id="s-address" class="search-box" value="'+(s.address||'').replace(/"/g,'&quot;')+'"></div>'+
      '<div style="display:flex;gap:8px;margin-bottom:10px"><div style="flex:1"><div style="font-size:11px;color:#888;margin-bottom:4px">開店時間</div><input id="s-open_hour" class="search-box" placeholder="06:30" value="'+(s.open_hour||'').replace(/"/g,'&quot;')+'"></div><div style="flex:1"><div style="font-size:11px;color:#888;margin-bottom:4px">打烊時間</div><input id="s-close_hour" class="search-box" placeholder="13:00" value="'+(s.close_hour||'').replace(/"/g,'&quot;')+'"></div></div>'+
      '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">營業日（顯示用）</div><input id="s-hours_weekday" class="search-box" placeholder="週一至週六 06:30-13:00" value="'+(s.hours_weekday||'').replace(/"/g,'&quot;')+'"></div>'+
      '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">公休日</div><input id="s-closed_day" class="search-box" value="'+(s.closed_day||'').replace(/"/g,'&quot;')+'"></div>'+
      '<div style="margin-bottom:10px"><div style="font-size:11px;color:#888;margin-bottom:4px">休假公告</div><textarea id="s-holiday_notice" class="search-box" style="height:60px;resize:none">'+(s.holiday_notice||'')+'</textarea></div>'+
      '<div style="text-align:right;margin-top:12px"><span id="settings-status" style="font-size:11px;margin-right:8px"></span><button class="btn-complete" style="padding:10px 24px;font-size:13px" onclick="saveSettings()">💾 儲存設定</button></div>'+
      '</div>';
  }catch(e){document.getElementById('p5').innerHTML='<div class="empty">載入失敗</div>';}
}
async function saveSettings(){
  var fields=['shop_name','phone','address','open_hour','close_hour','hours_weekday','closed_day','holiday_notice'];
  var st=document.getElementById('settings-status');
  st.textContent='儲存中...';st.style.color='#EF9F27';
  var ok=0;
  for(var f of fields){
    var el=document.getElementById('s-'+f);
    if(!el)continue;
    var val=el.value.trim();
    try{await callAPI('update_setting',{key:f,value:val});ok++;}catch(e){}
  }
  st.textContent='✅ 已儲存 '+ok+' 項設定';st.style.color='#1D9E75';
}

init();
</script>
